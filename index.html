<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Part 107 Flashcards</title>
  <style>
    :root {
      /* Skydio brand (see cloud/web/shared_ui, viz 3d viewer theme) */
      --skydio-blue: #0077ee;
      --skydio-blue-lightest: #c8dcff;
      --skydio-blue-lighter: #1eaaff;
      --skydio-blue-darker: #0564c8;
      --skydio-blue-darkest: #003264;
      --bg: #f5f9ff;
      --surface: #ffffff;
      --surface-hover: #e8f2ff;
      --border: #b8d4f0;
      --text: #003264;
      --muted: #4d6b8c;
      --accent: var(--skydio-blue);
      --accent-dim: var(--skydio-blue-darker);
      --card-front: #ffffff;
      --card-front-tint: #f0f7ff;
      --card-back: #ffffff;
      --card-back-tint: #e8f4ff;
    }

    * {
      box-sizing: border-box;
    }

    /* HTML hidden must override component rules like .exam-hud { display: flex } */
    [hidden] {
      display: none !important;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: linear-gradient(165deg, #ffffff 0%, var(--bg) 45%, #e8f2ff 100%);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1rem;
    }

    h1 {
      font-size: 1.25rem;
      font-weight: 600;
      margin: 0 0 0.25rem;
      letter-spacing: -0.02em;
      color: var(--skydio-blue);
    }

    .sub {
      color: var(--muted);
      font-size: 0.85rem;
      margin-bottom: 1rem;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: center;
      justify-content: center;
      margin-bottom: 1rem;
      max-width: 42rem;
    }

    button {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.45rem 0.85rem;
      border-radius: 8px;
      font-size: 0.875rem;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    button:hover {
      background: var(--surface-hover);
      border-color: var(--skydio-blue);
    }

    button:active {
      transform: scale(0.98);
    }

    button.primary {
      background: var(--skydio-blue);
      border-color: var(--skydio-blue-darker);
      color: #fff;
    }

    button.primary:hover {
      background: var(--skydio-blue-darker);
      border-color: var(--skydio-blue-darkest);
      color: #fff;
    }

    .progress {
      font-size: 0.8rem;
      color: var(--muted);
      width: 100%;
      text-align: center;
      margin-bottom: 0.75rem;
    }

    .wrap {
      perspective: 1200px;
      width: min(100%, 42rem);
      min-height: 220px;
    }

    .card {
      position: relative;
      width: 100%;
      min-height: 220px;
      cursor: pointer;
      transform-style: preserve-3d;
      transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
      display: grid;
      grid-template-columns: 1fr;
      grid-template-rows: minmax(220px, auto);
    }

    .card.flipped {
      transform: rotateY(180deg);
    }

    .face {
      grid-area: 1 / 1;
      position: relative;
      width: 100%;
      min-height: 220px;
      backface-visibility: hidden;
      border-radius: 14px;
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: stretch;
      justify-content: flex-start;
      padding: 1rem 1.35rem 1.25rem;
      line-height: 1.45;
      box-sizing: border-box;
    }

    .face-label {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 0.45rem;
      text-align: left;
      flex: 0 0 auto;
    }

    .face-body {
      margin: 0;
      flex: 1 1 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: clamp(1.2rem, 3.8vw, 1.55rem);
      min-height: 0;
    }

    .face.front {
      background: linear-gradient(145deg, var(--card-front), var(--card-front-tint));
      color: var(--text);
      box-shadow: 0 6px 28px rgba(0, 50, 100, 0.1);
    }

    .face.back {
      background: linear-gradient(145deg, var(--card-back), var(--card-back-tint));
      transform: rotateY(180deg);
      color: var(--text);
      box-shadow: 0 6px 28px rgba(0, 50, 100, 0.1);
    }

    .back-inner {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      width: 100%;
      text-align: left;
    }

    .answer-text {
      margin: 0;
      text-align: center;
      font-size: clamp(1.12rem, 3.4vw, 1.45rem);
      line-height: 1.45;
      flex: 0 0 auto;
    }

    .refs {
      font-size: clamp(0.82rem, 2.2vw, 0.95rem);
      line-height: 1.4;
      border-top: 1px solid var(--border);
      padding-top: 0.75rem;
      color: var(--muted);
      flex: 0 0 auto;
    }

    .refs-title {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin: 0 0 0.4rem;
      color: var(--muted);
    }

    .refs ul {
      margin: 0;
      padding-left: 1.1rem;
    }

    .refs li {
      margin: 0.25rem 0;
    }

    .refs a {
      color: var(--skydio-blue-darker);
      text-decoration: none;
      word-break: break-word;
      font-weight: 500;
    }

    .refs a:hover {
      text-decoration: underline;
      color: var(--skydio-blue);
    }

    .hint {
      margin-top: 0.75rem;
      font-size: 0.75rem;
      color: var(--muted);
      text-align: center;
    }

    .search {
      width: min(100%, 42rem);
      margin-bottom: 0.75rem;
    }

    .search input {
      width: 100%;
      padding: 0.5rem 0.75rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 0.9rem;
      box-shadow: 0 1px 3px rgba(0, 50, 100, 0.06);
    }

    .search input:focus {
      outline: 2px solid var(--skydio-blue-lightest);
      border-color: var(--skydio-blue);
    }

    .search input::placeholder {
      color: var(--muted);
    }

    kbd {
      font-family: inherit;
      font-size: 0.7rem;
      padding: 0.1rem 0.35rem;
      border: 1px solid var(--skydio-blue-lightest);
      border-radius: 4px;
      background: #ffffff;
      color: var(--skydio-blue-darkest);
    }

    .exam-setup {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 0.5rem 0.75rem;
      width: min(100%, 42rem);
      margin-bottom: 0.75rem;
      padding: 0.65rem 0.85rem;
      border-radius: 10px;
      border: 1px dashed var(--border);
      background: rgba(255, 255, 255, 0.7);
      font-size: 0.875rem;
      color: var(--text);
    }

    .exam-setup label {
      font-weight: 600;
      color: var(--skydio-blue-darkest);
    }

    .exam-setup select {
      padding: 0.35rem 0.5rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 0.875rem;
    }

    .exam-hud {
      width: min(100%, 42rem);
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
      padding: 0.5rem 0.75rem;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--skydio-blue-darkest), #004a8c);
      color: #fff;
      font-size: 0.85rem;
      font-weight: 500;
    }

    .exam-hud span {
      flex: 1 1 auto;
      min-width: 0;
    }

    .exam-hud button {
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.45);
      color: #fff;
      flex-shrink: 0;
    }

    .exam-hud button:hover {
      background: rgba(255, 255, 255, 0.28);
      border-color: #fff;
    }

    .exam-grade {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      justify-content: center;
      margin-top: 0.5rem;
      margin-bottom: 0.5rem;
      width: min(100%, 42rem);
    }

    .exam-grade #examNextBtn {
      min-width: 12rem;
    }

    .exam-results {
      width: min(100%, 42rem);
      margin-bottom: 1rem;
      padding: 1.25rem 1.5rem;
      border-radius: 14px;
      border: 2px solid var(--skydio-blue);
      background: var(--surface);
      text-align: center;
      box-shadow: 0 8px 32px rgba(0, 50, 100, 0.12);
    }

    .exam-results h2 {
      margin: 0 0 0.5rem;
      font-size: 1.35rem;
      color: var(--skydio-blue);
    }

    .exam-results .exam-stat {
      font-size: 1.1rem;
      margin: 0.35rem 0;
      color: var(--text);
    }

    .exam-results .exam-pct {
      font-size: 2rem;
      font-weight: 700;
      color: var(--skydio-blue-darkest);
      margin: 0.5rem 0;
    }

    body.exam-active .search,
    body.exam-active .search input {
      pointer-events: none;
      opacity: 0.45;
    }

    body.exam-active .toolbar button:not(#examEnd):not(.exam-grade-btn) {
      opacity: 0.5;
      pointer-events: none;
    }

    body.exam-active .toolbar button#flip:not(:disabled) {
      opacity: 1;
      pointer-events: auto;
    }

    .card.no-flip {
      cursor: default;
    }

    .exam-figures {
      width: min(100%, 42rem);
      margin-top: 0.5rem;
      margin-bottom: 0.25rem;
    }

    .exam-figure-block {
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--surface);
      padding: 0.65rem 0.85rem;
      box-shadow: 0 4px 16px rgba(0, 50, 100, 0.08);
    }

    .exam-figure-block img {
      display: block;
      max-width: 100%;
      height: auto;
      margin: 0 auto 0.5rem;
      border-radius: 8px;
    }

    .exam-figure-caption {
      font-size: 0.78rem;
      color: var(--muted);
      margin: 0;
      line-height: 1.4;
    }

    .exam-figure-caption a {
      color: var(--skydio-blue-darker);
    }

    .exam-mc {
      width: min(100%, 42rem);
      margin-top: 0.75rem;
      margin-bottom: 0.75rem;
    }

    .exam-mc-label {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--skydio-blue-darkest);
      margin: 0 0 0.5rem;
    }

    .exam-mc-options {
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
    }

    .exam-choice-btn {
      text-align: left;
      padding: 0.65rem 0.85rem;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 0.9rem;
      line-height: 1.35;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    .exam-choice-btn:hover:not(:disabled) {
      border-color: var(--skydio-blue);
      background: var(--surface-hover);
    }

    .exam-choice-btn:disabled {
      cursor: default;
      opacity: 1;
    }

    .exam-choice-btn.exam-choice-correct {
      border-color: #0a7d4a;
      background: #e8f8ef;
      color: #064a2e;
    }

    .exam-choice-btn.exam-choice-wrong {
      border-color: #c94c4c;
      background: #ffeef0;
      color: #7a1a1a;
    }

    .home-view {
      width: min(100%, 52rem);
      text-align: center;
    }

    .category-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin: 1.5rem auto;
      padding: 0;
    }

    .category-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      padding: 1.5rem 1rem;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: var(--surface);
      text-decoration: none;
      color: var(--text);
      transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s;
      box-shadow: 0 2px 12px rgba(0, 50, 100, 0.06);
    }

    .category-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 28px rgba(0, 50, 100, 0.13);
      border-color: var(--skydio-blue);
    }

    .category-card:active {
      transform: translateY(-1px);
    }

    .category-icon {
      font-size: 2.2rem;
      line-height: 1;
    }

    .category-label {
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--skydio-blue-darkest);
    }

    .category-desc {
      font-size: 0.82rem;
      color: var(--muted);
      line-height: 1.4;
    }

    .category-count {
      font-size: 0.78rem;
      color: var(--skydio-blue);
      font-weight: 600;
      margin-top: 0.25rem;
    }

    .study-view {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      color: var(--skydio-blue);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      margin-bottom: 0.5rem;
      padding: 0.3rem 0.6rem;
      border-radius: 6px;
      transition: background 0.15s;
    }

    .back-link:hover {
      background: var(--surface-hover);
    }

    .category-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--skydio-blue-darkest);
      margin: 0 0 0.25rem;
    }
  </style>
</head>

<body>
  <h1>Part 107 flashcards</h1>

  <div id="homeView" class="home-view" hidden>
    <p class="sub">Choose a category to study</p>
    <div class="category-grid" id="categoryGrid"></div>
  </div>

  <div id="studyView" class="study-view" hidden>
    <a href="index.html" class="back-link" id="backLink">&larr; All categories</a>
    <p class="category-title" id="categoryTitle"></p>
    <p class="sub" id="subLine">FAA small UAS (sUAS) — tap card or press <kbd>Space</kbd> to flip ·
      <kbd>←</kbd><kbd>→</kbd> navigate ·
      <kbd>S</kbd> shuffle · <kbd>R</kbd> random · references (eCFR, FAA, PHAK) on the back
    </p>
    <div class="exam-setup" id="examSetup">
      <label for="examLength">Practice exam</label>
      <select id="examLength" aria-label="Number of practice exam questions">
        <option value="10">10 questions</option>
        <option value="25" selected>25 questions</option>
        <option value="50">50 questions</option>
        <option value="60">60 questions</option>
        <option value="72">72 questions (full bank)</option>
      </select>
      <button type="button" class="primary" id="examStart">Start exam</button>
    </div>
    <div class="exam-hud" id="examHud" hidden>
      <span id="examHudText"></span>
      <button type="button" id="examEnd">End exam</button>
    </div>
    <div class="exam-results" id="examResults" hidden>
      <h2>Exam complete</h2>
      <p class="exam-pct" id="examResultPct"></p>
      <p class="exam-stat" id="examResultDetail"></p>
      <p class="exam-stat" id="examResultTime"></p>
      <button type="button" class="primary" id="examDismiss">Back to study</button>
    </div>
    <div class="search"><input type="search" id="filter" placeholder="Filter cards (question or answer)…"
        autocomplete="off" /></div>
    <div class="progress" id="progress"></div>
    <div class="toolbar" id="mainToolbar">
      <button type="button" id="prev">← Prev</button>
      <button type="button" class="primary" id="flip">Flip</button>
      <button type="button" id="next">Next →</button>
      <button type="button" id="shuffle">Shuffle deck</button>
      <button type="button" id="random">Random card</button>
    </div>
    <div class="wrap" id="cardWrap">
      <div class="card" id="card" role="button" tabindex="0" aria-label="Flashcard. Click to flip.">
        <div class="face front">
          <span class="face-label">Question</span>
          <p class="face-body" id="q"></p>
        </div>
        <div class="face back">
          <div class="back-inner">
            <span class="face-label">Answer</span>
            <p class="answer-text" id="a"></p>
            <div class="refs" id="refs" aria-label="Reference literature"></div>
          </div>
        </div>
      </div>
    </div>
    <div class="exam-figures" id="examFigures" hidden aria-label="Figure images for this question"></div>
    <div class="exam-mc" id="examMc" hidden>
      <p class="exam-mc-label" id="examMcLabel">Choose the best answer</p>
      <div class="exam-mc-options" id="examMcOptions"></div>
    </div>
    <div class="exam-grade" id="examGrade" hidden>
      <button type="button" class="primary exam-grade-btn" id="examNextBtn">Next question →</button>
    </div>
    <p class="hint" id="count"></p>
  </div>

  <script>
    (function () {
      const CARDS = [
        // ═══════════════════════════════════════════════════════════════
        // CFR — Subpart A: General (§107.1–§107.21)
        // ═══════════════════════════════════════════════════════════════
        { q: "What does 14 CFR Part 107 govern?", a: "Registration, airman certification, and operation of civil small unmanned aircraft systems within the United States, including eligibility to operate over human beings." },
        { q: "§107.3 — What is a 'small unmanned aircraft'?", a: "An unmanned aircraft weighing less than 55 pounds on takeoff, including everything on board or otherwise attached to the aircraft." },
        { q: "What is the maximum takeoff weight for a small UAS under Part 107?", a: "Less than 55 pounds (25 kg), including everything on board or attached at takeoff." },
        { q: "Does Part 107 apply to recreational flights under 49 U.S.C. §44809?", a: "No — Part 107 does not apply to aircraft subject to §44809 (recreational exception with TRUST test and community guidelines)." },
        { q: "§107.3 — Define 'control station.'", a: "An interface used by the remote pilot to control the flight path of the small unmanned aircraft." },
        { q: "§107.3 — Define 'corrective lenses.'", a: "Spectacles or contact lenses. Binoculars are NOT corrective lenses." },
        { q: "§107.3 — Define 'small unmanned aircraft system' (small UAS).", a: "A small unmanned aircraft and its associated elements (communication links and control components) required for safe and efficient operation in the national airspace system." },
        { q: "§107.3 — Define 'unmanned aircraft.'", a: "An aircraft operated without the possibility of direct human intervention from within or on the aircraft." },
        { q: "§107.3 — Define 'visual observer.'", a: "A person designated by the remote PIC to assist the remote PIC and person manipulating the flight controls to see and avoid other air traffic or objects aloft or on the ground." },
        { q: "§107.3 — What is a 'declaration of compliance'?", a: "A record submitted to the FAA certifying the small unmanned aircraft conforms to the Category 2 or Category 3 requirements under subpart D." },
        { q: "§107.5 — What happens if you falsify records or reports under Part 107?", a: "Your remote pilot certificate may be suspended or revoked, and your application may be denied." },
        { q: "§107.7 — Must you carry your remote pilot certificate when flying?", a: "Yes — the remote PIC must have the certificate with small UAS rating in physical possession and readily accessible when exercising privileges." },
        { q: "§107.7 — To whom must you present your remote pilot certificate on request?", a: "The FAA Administrator, NTSB authorized representative, any federal/state/local law enforcement officer, or TSA authorized representative." },
        { q: "§107.7 — Can the FAA inspect your small UAS?", a: "Yes — you must allow the Administrator to make any test or inspection of the sUAS, remote PIC, person manipulating controls, and visual observer to determine compliance." },
        { q: "§107.9 — When must you report a safety event to the FAA?", a: "No later than 10 calendar days after the operation." },
        { q: "§107.9 — What triggers mandatory safety event reporting?", a: "(a) Serious injury to any person or any loss of consciousness, OR (b) damage to any property (other than the sUAS) exceeding $500 in repair cost or fair market value." },
        { q: "§107.9 — What is the dollar threshold for property damage reporting?", a: "$500 — either the cost of repair (materials + labor) exceeds $500, or the fair market value exceeds $500 in the event of total loss." },
        { q: "§107.9 — Does the $500 damage threshold include damage to the drone itself?", a: "No — the $500 threshold applies to property OTHER than the small unmanned aircraft." },
        { q: "§107.9 — How many calendar days do you have to report an accident?", a: "10 calendar days." },
        { q: "§107.9 — Is loss of consciousness of any person reportable?", a: "Yes — serious injury to any person OR any loss of consciousness triggers the reporting requirement." },
        { q: "§107.12 — Who must hold a remote pilot certificate?", a: "The remote PIC must hold a remote pilot certificate with small UAS rating and satisfy recency requirements — unless someone manipulating controls is under direct supervision of a certificated remote PIC." },
        { q: "§107.12 — Can you fly without a remote pilot certificate?", a: "Only if you are under the direct supervision of a remote PIC who holds the certificate AND that remote PIC has the ability to immediately take direct control of the flight." },
        { q: "§107.12 — Can a foreign pilot operate a civil foreign-registered sUAS in the US?", a: "Only if authorized by the Administrator, consistent with international standards, without an FAA-issued remote pilot certificate." },
        { q: "§107.13 — Must sUAS be registered with the FAA?", a: "Yes — all civil sUAS must be registered before flight. Register online at FAA DroneZone. You receive a registration number that must be displayed on the aircraft. Registration is valid for 3 years and costs $5." },
        { q: "§107.15 — What must the remote PIC ensure about the aircraft before flight?", a: "That the sUAS is in a condition for safe operation. Prior to each flight, the remote PIC must check the sUAS to determine this." },
        { q: "§107.15 — Can you continue flying if you discover an unsafe condition?", a: "No — no person may continue flight when they know or have reason to know the sUAS is no longer in a condition for safe operation." },
        { q: "§107.17 — When may you NOT operate or act as remote PIC?", a: "When you know or have reason to know that you have a physical or mental condition that would interfere with safe operation of the sUAS." },
        { q: "§107.17 — Is an FAA medical certificate required for Part 107?", a: "No medical certificate is required, but you must self-assess that you have no physical or mental condition interfering with safe operation." },
        { q: "§107.19 — Who is directly responsible for the sUAS operation?", a: "The remote pilot in command is directly responsible for and is the final authority as to the operation." },
        { q: "§107.19 — When must a remote PIC be designated?", a: "Before or during the flight of the small unmanned aircraft." },
        { q: "§107.19 — What must the remote PIC ensure regarding loss of control?", a: "That the sUAS will pose no undue hazard to other people, other aircraft, or other property in the event of a loss of control for any reason." },
        { q: "§107.19 — Must the remote PIC ensure compliance with all applicable regulations?", a: "Yes — the remote PIC must ensure the sUAS operation complies with all applicable regulations of 14 CFR." },
        { q: "§107.19 — Can the remote PIC delegate final authority?", a: "No — the remote PIC is always the final authority as to the operation of the sUAS." },
        { q: "§107.21 — In an emergency, can the remote PIC deviate from Part 107?", a: "Yes — the remote PIC may deviate from any rule of Part 107 to the extent necessary to meet that emergency." },
        { q: "§107.21 — After deviating from rules in an emergency, what must you do?", a: "Upon request of the Administrator, send a written report of the deviation." },
        // ═══════════════════════════════════════════════════════════════
        // CFR — Subpart B: Operating Rules (§107.23–§107.51)
        // ═══════════════════════════════════════════════════════════════
        { q: "§107.23 — What does the hazardous operation rule prohibit?", a: "(a) Operating a sUAS in a careless or reckless manner so as to endanger the life or property of another, and (b) dropping an object in a manner that creates an undue hazard." },
        { q: "§107.23 — Can you drop objects from a drone under Part 107?", a: "Yes, but not in a manner that creates an undue hazard to persons or property." },
        { q: "§107.25 — Can you operate a sUAS from a moving aircraft?", a: "No — operating from a moving aircraft is prohibited." },
        { q: "§107.25 — Can you operate a sUAS from a moving vehicle?", a: "Only if the sUAS is flown over a sparsely populated area and is NOT transporting another person's property for compensation or hire." },
        { q: "§107.25 — Two conditions for operating from a moving vehicle?", a: "(1) Over a sparsely populated area, and (2) not transporting another person's property for compensation or hire." },
        { q: "§107.27 — What alcohol/drug rules apply to Part 107 operations?", a: "§91.17: No operating (1) within 8 hours of consuming alcohol ('8 hours bottle to throttle'), (2) while under the influence of alcohol, (3) with a blood alcohol content of 0.04% or greater, or (4) while using any drug that affects faculties contrary to safety. §91.19: No carrying a person who appears intoxicated (less relevant for sUAS). These apply to the remote PIC, person manipulating controls, and visual observer." },
        { q: "§107.29 — What training is required for night operations?", a: "The remote PIC must have completed the updated initial knowledge test or recurrent training (which includes night operations topics) after April 6, 2021. If you passed the old test before that date, you need to complete the updated recurrent training before flying at night. No separate waiver is needed — night flight is allowed by default once training is current." },
        { q: "§107.29 — What lighting is required for night operations?", a: "Anti-collision lighting visible for at least 3 statute miles with a flash rate sufficient to avoid a collision." },
        { q: "Under Part 107, how far must anti-collision lights be visible for night or twilight sUAS flight?", a: "At least 3 statute miles." },
        { q: "§107.29 — Can the remote PIC reduce anti-collision light intensity?", a: "Yes — the PIC may reduce intensity (but not extinguish) the anti-collision lighting if operating conditions make it in the interest of safety." },
        { q: "§107.29 — Must anti-collision lighting be used during civil twilight?", a: "Yes — the sUAS must have lighted anti-collision lighting visible for at least 3 statute miles during civil twilight." },
        { q: "§107.29 — What is civil twilight (except Alaska)?", a: "Morning: 30 minutes before official sunrise to official sunrise. Evening: official sunset to 30 minutes after official sunset." },
        { q: "Civil twilight begins how many minutes before sunrise?", a: "30 minutes before official sunrise (and ends at sunrise)." },
        { q: "Civil twilight ends how many minutes after sunset?", a: "30 minutes after official sunset (begins at sunset)." },
        { q: "§107.31 — What does VLOS require?", a: "The remote PIC, VO, or person manipulating controls must be able to see the unmanned aircraft throughout the entire flight with vision unaided by any device other than corrective lenses." },
        { q: "§107.31 — Can you use binoculars to maintain VLOS?", a: "No — only corrective lenses (spectacles or contact lenses) are permitted. Binoculars are not corrective lenses." },
        { q: "§107.31 — What four things must you determine by VLOS?", a: "(1) The aircraft's location, (2) its attitude, altitude, and direction of flight, (3) observe airspace for other traffic or hazards, (4) determine it doesn't endanger life or property." },
        { q: "§107.31 — Who can satisfy the VLOS requirement?", a: "Either (1) the remote PIC and person manipulating controls, or (2) a visual observer." },
        { q: "Under Part 107, can FPV (first-person view) goggles satisfy the visual line of sight requirement?", a: "No — a person with unaided visual line of sight (PIC or VO) is always required." },
        { q: "§107.33 — Is a visual observer required?", a: "No — a VO is optional, but if used, specific requirements apply." },
        { q: "§107.33 — What communication is required when using a VO?", a: "The remote PIC, person manipulating controls, and VO must maintain effective communication with each other at all times." },
        { q: "§107.33 — What must the VO do?", a: "Be able to see the aircraft per §107.31, and coordinate with the PIC/crew to scan for collision hazards and maintain awareness of the aircraft's position through direct visual observation." },
        { q: "§107.35 — How many sUAS may one person operate at once?", a: "One — a person may not manipulate controls or act as PIC or VO in the operation of more than one unmanned aircraft at the same time." },
        { q: "§107.36 — Can a small unmanned aircraft carry hazardous material?", a: "No — a small unmanned aircraft may not carry hazardous material as defined in 49 CFR 171.8." },
        { q: "§107.37 — To whom must a sUAS yield right-of-way?", a: "All aircraft, airborne vehicles, and launch and reentry vehicles. Must give way and not pass over, under, or ahead unless well clear." },
        { q: "§107.37 — How close can you fly to another aircraft?", a: "You may not operate so close to another aircraft as to create a collision hazard." },
        { q: "§107.39 — When can you fly over a human being?", a: "Only when: (a) that person is directly participating in the operation, (b) they are under a covered structure or inside a stationary vehicle providing reasonable protection, or (c) the operation meets a Category 1–4 requirement." },
        { q: "§107.39 — Can you fly over a person inside a building?", a: "Yes — a person under a covered structure or inside a stationary vehicle that provides reasonable protection from a falling sUAS is not subject to operations-over-people restrictions." },
        { q: "§107.41 — What airspace requires prior ATC authorization?", a: "Class B, Class C, Class D, and Class E airspace designated for an airport (surface area)." },
        { q: "§107.41 — In what class of airspace can you fly without prior authorization?", a: "Class G (uncontrolled) airspace — no ATC authorization required." },
        { q: "§107.43 — What is prohibited regarding airports?", a: "No person may operate a sUAS in a manner that interferes with operations and traffic patterns at any airport, heliport, or seaplane base." },
        { q: "§107.45 — Can you fly in prohibited or restricted areas?", a: "Only with permission from the using or controlling agency." },
        { q: "§107.47 — What flight restrictions must a remote PIC comply with?", a: "All Temporary Flight Restrictions (TFRs) and NOTAMs, specifically: disaster/hazard area restrictions, national security restrictions, presidential/VIP movement restrictions, space operations restrictions, aviation event restrictions (airshows), and Air Defense Identification Zone (ADIZ) requirements. Check NOTAMs before every flight." },
        { q: "§107.49 — What must the remote PIC do before flight?", a: "Assess the operating environment considering risks to persons and property — including (1) local weather, (2) local airspace and restrictions, (3) location of persons and property on the surface, and (4) other ground hazards." },
        { q: "§107.49 — Must crew be briefed before flight?", a: "Yes — the remote PIC must ensure all persons directly participating are informed about operating conditions, emergency procedures, contingency procedures, roles and responsibilities, and potential hazards." },
        { q: "§107.49 — What must be checked regarding control links?", a: "Ensure all control links between the ground control station and the sUAS are working properly." },
        { q: "§107.49 — What must be checked regarding power?", a: "If the sUAS is powered, ensure there is enough available power for the intended operational time." },
        { q: "§107.49 — What must be checked about objects attached to the aircraft?", a: "Any object attached or carried must be secure and must not adversely affect flight characteristics or controllability." },
        { q: "§107.51(a) — What is the maximum groundspeed for a small UAS?", a: "87 knots (100 miles per hour)." },
        { q: "Under Part 107, what is the maximum groundspeed for a sUAS in miles per hour?", a: "100 mph." },
        { q: "Under Part 107, what is the maximum groundspeed for a sUAS in knots?", a: "87 knots." },
        { q: "§107.51(b) — What is the maximum altitude for a small UAS?", a: "400 feet above ground level (AGL)." },
        { q: "How high can a UAS fly under Part 107?", a: "400 feet AGL, unless within a 400-foot radius of a structure — then up to 400 feet above the structure's immediate uppermost limit." },
        { q: "§107.51(b) — Structure exception to the 400 ft altitude limit?", a: "The sUAS may fly higher than 400 ft AGL if (1) it is within a 400-foot radius of a structure, and (2) does not fly higher than 400 feet above the structure's immediate uppermost limit." },
        { q: "What is the lateral limit for the structure altitude exception?", a: "400-foot radius from the structure." },
        { q: "If a tower is 300 feet tall, what is the max altitude within its vicinity?", a: "700 feet AGL (300 ft structure + 400 ft above it), if within a 400-foot radius." },
        { q: "If a building is 500 feet tall, what is the max altitude within its vicinity?", a: "900 feet AGL (500 ft structure + 400 ft above it), if within a 400-foot radius." },
        { q: "If a structure is 100 feet tall, what is the max altitude in its vicinity?", a: "500 feet AGL (100 ft + 400 ft), if within a 400-foot radius." },
        { q: "§107.51(c) — What is the minimum flight visibility for Part 107 operations?", a: "3 statute miles, as observed from the location of the control station." },
        { q: "How is flight visibility defined under Part 107?", a: "The average slant distance from the control station at which prominent unlighted objects may be seen and identified by day and prominent lighted objects by night." },
        { q: "If visibility is 2.5 statute miles, can you fly?", a: "No — minimum flight visibility is 3 statute miles." },
        { q: "§107.51(d) — How far below clouds must a small UAS stay?", a: "500 feet below the cloud." },
        { q: "§107.51(d) — How far horizontally from clouds must a small UAS stay?", a: "2,000 feet horizontally from the cloud." },
        { q: "What are the cloud clearance requirements (vertical and horizontal) under Part 107?", a: "500 feet below and 2,000 feet horizontal." },
        { q: "If clouds are at 800 ft AGL, what is your maximum altitude?", a: "300 feet AGL (800 − 500 = 300 ft, to maintain 500 ft below clouds)." },
        { q: "If clouds are at 450 ft AGL, can you legally fly?", a: "Only below 0 ft AGL (450 − 500 = −50), which is impossible — so no, you effectively cannot fly (insufficient cloud clearance below 400 ft)." },
        { q: "§107.52 — Can you operate a sUAS with a transponder?", a: "No — unless otherwise authorized by the Administrator, you may not operate with a transponder on." },
        { q: "§107.53 — Can you operate a sUAS with ADS-B Out transmitting?", a: "No — unless otherwise authorized by the Administrator, you may not operate with ADS-B Out in transmit mode." },
        // ═══════════════════════════════════════════════════════════════
        // CFR — Subpart C: Remote Pilot Certification (§107.56–§107.79)
        // ═══════════════════════════════════════════════════════════════
        { q: "§107.57 — What happens if convicted of a drug-related offense?", a: "Grounds for (1) denial of application for up to 1 year after final conviction, or (2) suspension or revocation of remote pilot certificate." },
        { q: "§107.59 — What happens if you refuse an alcohol test?", a: "Grounds for (1) denial of application for up to 1 year, or (2) suspension or revocation of remote pilot certificate." },
        { q: "§107.61 — Minimum age for a remote pilot certificate?", a: "16 years old." },
        { q: "§107.61 — Language requirement for remote pilot certificate?", a: "Must be able to read, speak, write, and understand English." },
        { q: "§107.61 — What are the eligibility requirements for a remote pilot certificate?", a: "(a) At least 16, (b) read/speak/write/understand English, (c) no known physical or mental condition interfering with safe operation, (d) demonstrate aeronautical knowledge." },
        { q: "§107.61 — How do you demonstrate aeronautical knowledge for a remote pilot certificate?", a: "Two paths: (1) Pass the initial aeronautical knowledge test (60 questions, covers regulations, airspace, weather, loading, emergency procedures, CRM, radio comms, performance, drugs/alcohol, ADM, airport ops, maintenance, and night ops). OR (2) If you already hold a manned pilot certificate (not student) with a current flight review, complete a shorter Part 107 online training course instead of the full test." },
        { q: "§107.63 — What must accompany an application for a remote pilot certificate?", a: "Either: (1) your airman knowledge test report showing you passed the initial Part 107 test, OR (2) if you hold a manned pilot certificate (not student) with a current flight review, a certificate of completion from the Part 107 online training course. For path (2), a flight instructor, examiner, or Flight Standards office must verify your identity and confirm your flight review is current." },
        { q: "§107.64 — How long is a temporary remote pilot certificate valid?", a: "Up to 120 calendar days." },
        { q: "§107.64 — When does a temporary certificate expire?", a: "(1) On the expiration date shown, (2) upon receipt of the permanent certificate, or (3) upon notice that the certificate is denied or revoked." },
        { q: "§107.65 — How often must you complete recurrent training or testing?", a: "Within the previous 24 calendar months." },
        { q: "How often must a Part 107 remote pilot complete recurrent training or testing?", a: "Every 24 calendar months." },
        { q: "§107.65 — What satisfies the aeronautical knowledge recency requirement?", a: "Within the previous 24 calendar months you must have: (a) passed the initial knowledge test (covers all 13 knowledge areas including night ops), (b) completed free online recurrent training at FAA Safety (same knowledge areas), OR (c) if you hold a manned pilot certificate with a current flight review, completed the shorter Part 107-specific online training. Any one of these keeps your certificate current." },
        { q: "Does the remote pilot certificate expire?", a: "No — but you cannot exercise privileges unless you have completed recurrent training/testing within the previous 24 calendar months." },
        { q: "§107.67 — What ID is required for a knowledge test?", a: "Proper identification with: (1) photograph, (2) signature, (3) date of birth, and (4) permanent mailing address." },
        { q: "§107.69 — Penalty for cheating on a knowledge test?", a: "Prohibited from applying for any certificate/rating/authorization AND from taking any test for 1 year. Existing certificates may also be suspended or revoked." },
        { q: "§107.69 — For how long are you banned from testing after cheating?", a: "1 year after the date of the prohibited act." },
        { q: "§107.71 — How long must you wait to retake a failed knowledge test?", a: "14 calendar days after failing." },
        { q: "After failing the Part 107 knowledge test, how long must you wait to retake it?", a: "14 calendar days." },
        { q: "§107.73 — What knowledge areas does the initial test and recurrent training cover?", a: "(a) Regulations, (b) airspace classification and restrictions, (c) weather sources and effects, (d) sUAS loading, (e) emergency procedures, (f) CRM, (g) radio comms, (h) performance, (i) drugs/alcohol effects, (j) ADM, (k) airport operations, (l) maintenance/preflight, (m) night operations." },
        { q: "How many knowledge areas are on the Part 107 test?", a: "13 areas: regulations, airspace, weather, loading, emergency, CRM, radio comms, performance, drugs/alcohol, ADM/judgment, airport ops, maintenance/preflight, and night operations." },
        { q: "§107.77 — How soon must you notify the FAA of an address change?", a: "Within 30 days — you may not exercise privileges after 30 days from the change unless the FAA has been notified." },
        { q: "After changing your permanent address, how long do you have to notify the FAA?", a: "30 days." },
        { q: "§107.79 — Can you voluntarily surrender your remote pilot certificate?", a: "Yes — you may voluntarily surrender it for cancellation, but to get it back you must start over: meet all eligibility requirements (age 16+, English, no disqualifying conditions) and either pass the full initial knowledge test again or complete initial training if you hold a manned pilot certificate." },
        // ═══════════════════════════════════════════════════════════════
        // CFR — Subpart D: Operations Over Human Beings (§107.100–§107.145)
        // ═══════════════════════════════════════════════════════════════
        { q: "What are the four categories for operations over human beings, and when does each apply?", a: "Category 1: sUAS ≤ 0.55 lbs (250 g), no exposed rotating parts — fly over anyone, no FAA declaration needed. Category 2: sUAS won't transfer > 11 ft-lbs kinetic energy on impact — requires FAA-accepted declaration of compliance; CAN fly over open-air assemblies. Category 3: sUAS won't transfer > 25 ft-lbs kinetic energy — requires declaration; CANNOT fly over open-air assemblies; restricted to closed/restricted sites or no sustained flight over people. Category 4: sUAS has an FAA airworthiness certificate (like manned aircraft) — operated per its approved Flight Manual." },
        { q: "How do you decide which operations-over-people category applies to your drone?", a: "Start with your aircraft: (1) If it weighs ≤ 0.55 lbs with no exposed blades → Category 1, simplest path. (2) If heavier but impact ≤ 11 ft-lbs → Category 2 (manufacturer files declaration with FAA, labels the aircraft). (3) If impact ≤ 25 ft-lbs → Category 3 (same declaration process, but you CANNOT fly over open-air assemblies and must use closed sites or avoid sustained overflight). (4) If the sUAS has an airworthiness certificate → Category 4 (most capable, follows manned-aircraft-style maintenance rules)." },
        { q: "§107.110 — For Category 1 operations over human beings, what is the max aircraft weight?", a: "0.55 pounds (250 grams) or less on takeoff and throughout the operation, including everything on board or attached." },
        { q: "Operations over people — Category 1 weight limit is 0.55 lbs. How many grams is that?", a: "250 grams." },
        { q: "§107.110 — For Category 1 operations over human beings, what is the rotating parts requirement?", a: "Must not contain any exposed rotating parts that would lacerate human skin upon impact." },
        { q: "§107.110 — Can a Category 1 sUAS (operations over people) fly over open-air assemblies of human beings?", a: "Yes — but only if the operation meets Remote ID requirements (§89.110 or §89.115(a)). No sustained flight over open-air assemblies without Remote ID compliance." },
        { q: "§107.120 — For Category 2 operations over human beings, what is the kinetic energy impact limit?", a: "Must not cause injury equivalent to or greater than a transfer of 11 foot-pounds of kinetic energy upon impact from a rigid object." },
        { q: "What is the kinetic energy threshold for Category 2 operations over human beings?", a: "11 foot-pounds." },
        { q: "§107.120 — What three design requirements must a sUAS meet for Category 2 operations over human beings?", a: "(1) Kinetic energy ≤ 11 ft-lbs, (2) no exposed rotating parts that would lacerate skin, (3) no safety defects." },
        { q: "§107.120 — What does the manufacturer/applicant need for Category 2 operations over human beings?", a: "An FAA-accepted declaration of compliance, a label on the aircraft, remote pilot operating instructions, and a product support/notification process." },
        { q: "§107.115 — Can a Category 2 sUAS (operations over people) fly over open-air assemblies?", a: "Yes — if it meets Remote ID requirements." },
        { q: "§107.130 — For Category 3 operations over human beings, what is the kinetic energy impact limit?", a: "Must not cause injury equivalent to or greater than a transfer of 25 foot-pounds of kinetic energy upon impact from a rigid object." },
        { q: "What is the kinetic energy threshold for Category 3 operations over human beings?", a: "25 foot-pounds." },
        { q: "§107.125 — Can a Category 3 sUAS (operations over people) fly over open-air assemblies?", a: "No — Category 3 may NOT operate over open-air assemblies of human beings." },
        { q: "§107.125 — Under Category 3 operations over human beings, what are the restrictions on flying over people?", a: "May only fly over people if: (1) within a closed/restricted-access site where people are on notice, OR (2) does not maintain sustained flight over anyone not directly participating or not under cover/in a stationary vehicle." },
        { q: "Operations over people — what are the kinetic energy limits for Category 2 vs Category 3?", a: "Category 2: ≤ 11 ft-lbs. Category 3: ≤ 25 ft-lbs." },
        { q: "Operations over people — how do Category 2 and Category 3 differ regarding open-air assemblies?", a: "Category 2 CAN fly over open-air assemblies (with Remote ID). Category 3 CANNOT." },
        { q: "§107.130 — For operations over people, what is the product-notification difference between Category 2 and Category 3?", a: "Category 2 product support must notify about defects causing 'low probability of casualty.' Category 3 must notify about 'low probability of fatality.'" },
        { q: "§107.135 — For operations over people, what must the PIC do if the Category 2 or 3 label is damaged or missing?", a: "The remote PIC must label the aircraft in English (legible, prominent) before conducting operations over human beings. Must correctly identify the category." },
        { q: "§107.140 — What are the aircraft requirements for Category 4 operations over human beings?", a: "Must (1) have an FAA airworthiness certificate (the same type-certification process used for manned aircraft), (2) be operated per its approved Flight Manual with no prohibition on flying over people, (3) have maintenance performed by qualified persons using manufacturer-approved methods, with records retained (1 year for work records; life-limited parts and inspection records transfer with the aircraft on sale)." },
        { q: "§107.140 — What makes Category 4 (operations over human beings) unique compared to Categories 1–3?", a: "It requires an actual airworthiness certificate — the same type of certification used for manned aircraft." },
        { q: "§107.140 — For Category 4 operations over people, how long must maintenance records be retained?", a: "Maintenance records: 1 year after work is completed or until superseded. Life-limited part records and inspection status: retained and transferred with the aircraft on change of ownership." },
        { q: "§107.145 — Under operations-over-people rules, can you fly over people inside moving vehicles?", a: "Only if (a) the operation meets Cat 1–4 requirements, AND (b) for Cat 1/2/3, either the site is closed/restricted-access with people on notice, or the aircraft doesn't maintain sustained flight over the vehicle." },
        { q: "§107.145 — What are the Category 4 restrictions for flying over people in moving vehicles?", a: "Category 4 operations over moving vehicles must simply meet §107.140 requirements — no additional closed-site restriction." },
        // ═══════════════════════════════════════════════════════════════
        // CFR — Waivers & General Regulatory (§107.200+)
        // ═══════════════════════════════════════════════════════════════
        { q: "§107.200 — Can Part 107 rules be waived?", a: "Yes — the Administrator may issue a certificate of waiver authorizing deviation from certain provisions if the operation can be safely conducted." },
        { q: "What rules CANNOT be waived under Part 107?", a: "Registration requirements, alcohol/drug prohibitions (8 hrs bottle-to-throttle, 0.04% BAC), the 10-day accident reporting requirement, the prohibition on careless/reckless operation, and remote PIC qualification requirements. These are fundamental safety rules that apply regardless of any waiver." },
        { q: "How do you apply for a Part 107 waiver?", a: "Through FAA DroneZone, demonstrating you can conduct the operation safely under the proposed conditions." },
        { q: "What is LAANC (Low Altitude Authorization and Notification Capability)?", a: "Low Altitude Authorization and Notification Capability — near-real-time automated airspace authorization for controlled airspace." },
        { q: "What is the purpose of UAS Facility Maps?", a: "Show maximum altitudes around airports where LAANC auto-approvals may apply." },
        // ═══════════════════════════════════════════════════════════════
        // CFR — Key Numbers Summary (rapid-fire drill)
        // ═══════════════════════════════════════════════════════════════
        { q: "NUMBER: What is the max takeoff weight for a small UAS under Part 107?", a: "Less than 55 lbs (25 kg)." },
        { q: "NUMBER: What is the max groundspeed for a sUAS under Part 107?", a: "100 mph (87 knots)." },
        { q: "NUMBER: What is the max altitude AGL for a sUAS under Part 107?", a: "400 feet." },
        { q: "NUMBER: What is the minimum flight visibility required under Part 107?", a: "3 statute miles." },
        { q: "NUMBER: What is the minimum distance a sUAS must maintain below clouds?", a: "500 feet." },
        { q: "NUMBER: What is the minimum horizontal distance a sUAS must maintain from clouds?", a: "2,000 feet." },
        { q: "NUMBER: How far must anti-collision lights be visible for night sUAS operations?", a: "3 statute miles." },
        { q: "NUMBER: How long before sunrise / after sunset does civil twilight last?", a: "30 minutes before sunrise / 30 minutes after sunset." },
        { q: "NUMBER: How many days do you have to report a sUAS accident to the FAA?", a: "10 calendar days." },
        { q: "NUMBER: What dollar amount of property damage triggers mandatory FAA accident reporting?", a: "$500 (other than the sUAS)." },
        { q: "NUMBER: What is the minimum age to obtain a Part 107 remote pilot certificate?", a: "16 years old." },
        { q: "NUMBER: How often must Part 107 recurrent training or testing be completed?", a: "24 calendar months." },
        { q: "NUMBER: How long must you wait to retake the Part 107 knowledge test after failing?", a: "14 calendar days." },
        { q: "NUMBER: After moving, how many days do you have to notify the FAA of your new address?", a: "30 days." },
        { q: "NUMBER: How long is a temporary remote pilot certificate valid?", a: "Up to 120 calendar days." },
        { q: "NUMBER: Max weight for Category 1 operations over human beings?", a: "0.55 lbs (250 g)." },
        { q: "NUMBER: Kinetic energy limit for Category 2 operations over human beings?", a: "11 foot-pounds." },
        { q: "NUMBER: Kinetic energy limit for Category 3 operations over human beings?", a: "25 foot-pounds." },
        { q: "NUMBER: How far from a structure can you use the altitude exception above 400 ft AGL?", a: "400-foot radius." },
        { q: "NUMBER: How long can your remote pilot certificate application be denied after a drug conviction?", a: "Up to 1 year." },
        { q: "NUMBER: How long are you banned from FAA tests after cheating on a knowledge test?", a: "1 year from the date of the act." },
        // ═══════════════════════════════════════════════════════════════
        // CFR — Scenario-Based & Cross-Reference
        // ═══════════════════════════════════════════════════════════════
        { q: "Your drone weighs 54.9 lbs at takeoff — legal under Part 107?", a: "Yes — must be less than 55 lbs." },
        { q: "Your drone weighs exactly 55 lbs at takeoff — legal?", a: "No — must weigh LESS than 55 pounds." },
        { q: "You discover a cracked propeller during preflight — can you fly?", a: "No — §107.15 requires the sUAS to be in condition for safe operation." },
        { q: "Your VO calls out a manned helicopter approaching — what do you do?", a: "Yield right-of-way per §107.37 — give way, do not pass over/under/ahead unless well clear." },
        { q: "You're flying at night and your anti-collision light fails — what must you do?", a: "Land immediately — you cannot operate at night without lighted anti-collision lighting per §107.29." },
        { q: "A bystander walks under your drone during a commercial shoot — is this legal?", a: "Only if the bystander is under a covered structure, directly participating in the operation, or your aircraft meets a Category 1–4 requirement for operations over people." },
        { q: "You crash your drone into a car causing $600 damage — must you report?", a: "Yes — damage to property other than the sUAS exceeds $500, so you must report within 10 calendar days." },
        { q: "You crash your drone causing $400 damage to a fence — must you report?", a: "No — the $500 threshold is not met." },
        { q: "You're near a 200 ft cell tower — what's the max altitude?", a: "600 ft AGL (200 + 400), if within a 400-foot radius of the tower." },
        { q: "Your recurrent training expired 2 months ago — can you fly?", a: "No — you may not exercise remote PIC privileges until recurrent training is completed (§107.65)." },
        { q: "You failed the knowledge test yesterday — when can you retake?", a: "14 calendar days after the failed test (§107.71)." },
        { q: "A police officer asks to see your certificate — must you show it?", a: "Yes — §107.7 requires presenting your certificate upon request from law enforcement." },
        { q: "Can a 15-year-old get a remote pilot certificate?", a: "No — must be at least 16 years old (§107.61)." },
        { q: "You moved last week — when must you notify the FAA?", a: "Within 30 days. After 30 days without notification, you cannot exercise certificate privileges (§107.77)." },
        { q: "Part 107 vs §44809 recreational — what's the difference?", a: "Part 107 covers commercial and non-recreational operations with a remote pilot certificate. §44809 covers purely recreational flying with TRUST test and community guidelines." },
        { q: "Must you comply with TFRs when flying under Part 107?", a: "Yes — you must comply with all Temporary Flight Restrictions including: disaster/hazard areas, airspace restrictions for national security, presidential/VIP movement, space launch operations, and aviation events. Always check NOTAMs before every flight." },
        { q: "Can you fly a sUAS with a transponder turned on?", a: "No — §107.52 prohibits operating with a transponder on unless authorized by the Administrator." },
        { q: "Can you fly a sUAS with ADS-B Out transmitting?", a: "No — §107.53 prohibits operating with ADS-B Out in transmit mode unless authorized." },
        { q: "What does IACRA stand for and what is it used for?", a: "Integrated Airman Certification and Rating Application — used for pilot certificate applications." },
        { q: "What is an FSDO (Flight Standards District Office)?", a: "Flight Standards District Office — FAA local offices for questions and enforcement context." },
        // ═══════════════════════════════════════════════════════════════
        // CFR — ADM, Human Factors & Safety Culture
        // ═══════════════════════════════════════════════════════════════
        { q: "IMSAFE checklist — what does each letter stand for?", a: "Illness, Medication, Stress, Alcohol, Fatigue, Emotion (or Eating) — self-assessment for fitness to fly." },
        { q: "In ADM, what are the five hazardous attitudes and their antidotes?", a: "1) Anti-authority ('Rules don't apply to me') → 'Follow the rules, they are usually right.' 2) Impulsivity ('Do something quickly!') → 'Not so fast — think first.' 3) Invulnerability ('It won't happen to me') → 'It could happen to me.' 4) Macho ('I can do it, watch this') → 'Taking chances is foolish.' 5) Resignation ('What's the point?') → 'I'm not helpless — I can make a difference.'" },
        { q: "A pilot thinks 'The FAA rules are stupid, I'll fly my way' — which hazardous attitude is this, and what's the antidote?", a: "Anti-authority. Antidote: 'Follow the rules — they are usually right.'" },
        { q: "A pilot thinks 'I've flown a hundred times and never had an issue' — which hazardous attitude is this?", a: "Invulnerability — the belief that accidents happen to others, not to you. Antidote: 'It could happen to me.'" },
        { q: "A pilot rushes to launch without a full preflight because the client is waiting — which hazardous attitude is this?", a: "Impulsivity — acting without thinking. Antidote: 'Not so fast — think first.' Could also involve external pressure (addressed by the PAVE model)." },
        { q: "What are the six steps of the DECIDE model for aeronautical decision making?", a: "Detect, Estimate, Choose, Identify, Do, Evaluate." },
        { q: "What do the four letters in the PAVE hazard assessment model stand for?", a: "Pilot, Aircraft, enVironment, External pressures." },
        { q: "What is crew resource management (CRM) for UAS?", a: "Clear roles between PIC and VO/crew; closed-loop communication; shared situational awareness." },
        { q: "What is the sterile cockpit concept?", a: "Minimize distractions during critical phases of flight (takeoff, landing, near obstacles)." },
        { q: "Aeronautical decision making (ADM) purpose?", a: "A structured approach to reduce human error in aviation decision-making." },
        { q: "In aviation risk management, what is the difference between a risk and a hazard?", a: "A hazard is a condition or situation; risk is the likelihood and severity of the outcome." },
        { q: "What is situational awareness in the context of sUAS operations?", a: "Perceiving, comprehending, and projecting the future state of the flight and environment." },
        // ═══════════════════════════════════════════════════════════════
        // Airspace
        // ═══════════════════════════════════════════════════════════════
        { q: "What is the floor of Class A airspace in the US?", a: "Generally 18,000 ft MSL — sUAS typically operate far below." },
        { q: "What does Part 107 require to fly a sUAS in Class B airspace?", a: "Prior ATC authorization required (e.g., LAANC)." },
        { q: "What does Part 107 require to fly a sUAS in Class C airspace?", a: "Prior ATC authorization required." },
        { q: "What does Part 107 require to fly a sUAS in Class D airspace?", a: "Prior ATC authorization required." },
        { q: "What does Part 107 require to fly a sUAS in Class E surface area airspace?", a: "Prior authorization required if designated for an airport." },
        { q: "Does a sUAS need ATC authorization to fly in Class G airspace?", a: "No — uncontrolled airspace does not require ATC authorization (but check for other restrictions like TFRs)." },
        { q: "What is a TFR (Temporary Flight Restriction)?", a: "Temporary Flight Restriction — must be checked and complied with via NOTAMs." },
        { q: "Where do you check TFRs and NOTAMs before a flight?", a: "Best practice: obtain a weather briefing at 1800wxbrief.com (Leidos Flight Service). Also use FAA NOTAM search, the B4UFLY app, or FAA DroneZone. Always check before every flight — conditions change rapidly." },
        { q: "What is a Military Operations Area (MOA) on a sectional chart?", a: "An MOA is an area of military training activity (aerobatics, gunnery, etc.). Can you fly through it? Yes — MOAs are not prohibited to civil aircraft, but exercise extreme caution. To check if an MOA is active, refer to the chart legend for contact info and hours, or check NOTAMs." },
        { q: "What is a Restricted Area (R-####) on a sectional chart?", a: "Flight restricted when active — check NOTAMs and chart legend. Need permission from controlling agency." },
        { q: "What is a Prohibited Area (P-####) on a sectional chart?", a: "Flight prohibited — no operations without specific permission from controlling agency." },
        { q: "What is the Mode C veil around Class B airports and why does it matter for sUAS?", a: "30 NM from Class B primary airport — transponder requirement for manned aircraft; high traffic density for drone awareness." },
        { q: "What is an Alert Area (A-###) in special use airspace?", a: "A-### — high volume training activity; exercise caution." },
        { q: "What is a Warning Area (W-###) in special use airspace?", a: "International waters hazard — usually not inland." },
        { q: "What is a National Security Area on a sectional chart?", a: "Request to avoid — charted as national security sensitive." },
        { q: "What is a Military Training Route (MTR) and why does it matter for sUAS pilots?", a: "Routes where military aircraft fly at high speed and low altitude. 4-digit routes (VR1205, IR1234) = operations at or below 1,500 ft AGL — very dangerous for sUAS. 3-digit routes (VR125, IR305) = operations above 1,500 ft AGL — less risk but stay alert." },
        { q: "What is an FDC NOTAM (Flight Data Center NOTAM)?", a: "Flight Data Center NOTAM — regulatory changes, temporary rules." },
        { q: "How is Class E airspace starting at 700 ft AGL shown on a sectional chart?", a: "Fuzzy (fading) magenta boundary. Inside the magenta side, Class E starts at 700 ft AGL; below 700 AGL is Class G. This is the most common Class E depiction on sectional charts." },
        { q: "What is a Class E surface extension on a sectional chart?", a: "Shown as a dashed magenta (or blue) line extending from Class C/D airspace. Class E begins at the surface in these areas — typically along instrument approach corridors. sUAS need prior authorization to operate here." },
        { q: "What are wildfire TFRs and why are they critical for drone pilots?", a: "Strict temporary flight restrictions — no interference with firefighting aircraft." },
        { q: "What is a Presidential TFR and how does it affect sUAS operations?", a: "Large restricted areas — check NOTAMs for VIP movement." },
        { q: "What are the typical dimensions of a sporting event TFR?", a: "FAA restrictions around stadiums during events — typically 3 NM radius, 3,000 ft AGL." },
        { q: "What do FAA LAANC altitude grids (UAS Facility Maps) show?", a: "Authorization may be zero in some cells — read UAS Facility Maps." },
        { q: "What is the B4UFLY app and what does it do for drone pilots?", a: "FAA-sourced awareness tool for airspace and advisories." },
        { q: "Is Special VFR (SVFR) relevant to Part 107 sUAS operations?", a: "Generally not — Part 107 requires basic VFR minimums (3 SM, cloud clearance). SVFR is for manned operations." },
        { q: "What is the 'Class B shelf' shape on a sectional chart?", a: "Upside-down wedding cake — multiple altitude tiers of controlled airspace." },
        // ═══════════════════════════════════════════════════════════════
        // Sectional Charts
        // ═══════════════════════════════════════════════════════════════
        { q: "On a sectional chart, what do magenta vs blue airport symbols indicate?", a: "Blue = towered (controlled) airport. Magenta = non-towered (uncontrolled) airport. This color coding is consistent across the chart — frequencies, data blocks, and airspace boundaries all follow the same blue/magenta convention." },
        { q: "How do you read latitude and longitude on a sectional chart?", a: "Each degree of latitude or longitude is divided into 60 minutes. On the chart, every 10 minutes is marked with a heavy tick line. Example: if you see 47° with 3 heavy lines below it, that position is 46°30' (46 degrees and 30 minutes)." },
        { q: "How many minutes are in one degree of latitude or longitude?", a: "60 minutes per degree. Each heavy tick mark on a sectional chart represents 10 minutes." },
        { q: "On a sectional chart, you see 47° and count 3 heavy tick lines south of it. What is the latitude?", a: "46°30' — each heavy tick = 10 minutes, so 3 ticks = 30 minutes south of 47° = 46 degrees 30 minutes." },
        { q: "On an airspace shelf fraction like '40/SFC', what do the numbers mean?", a: "The top number (40) = ceiling in hundreds of feet MSL, so 4,000 ft MSL. The bottom (SFC) = surface (ground level). So '40/SFC' means the airspace extends from the surface up to 4,000 ft MSL." },
        { q: "On a sectional chart, what does '80/40' mean on an airspace shelf?", a: "The shelf extends from 4,000 ft MSL (bottom number × 100) up to 8,000 ft MSL (top number × 100). If you are below 4,000 MSL at that location, you are not inside that shelf." },
        { q: "What does a fuzzy magenta line on a sectional chart indicate?", a: "Class E airspace starts at 700 ft AGL. Below 700 ft AGL is Class G (uncontrolled). This is the most common Class E boundary you will encounter." },
        { q: "What does a fuzzy blue line on a sectional chart indicate?", a: "Class E airspace starts at 1,200 ft AGL. Below 1,200 ft AGL is Class G (uncontrolled)." },
        { q: "What does a dashed magenta line on a sectional chart indicate?", a: "Class E airspace starts at the surface (SFC). This typically appears as extensions from Class C or D airspace, often along instrument approach corridors." },
        { q: "What does a dashed blue line on a sectional chart indicate?", a: "Class E airspace starts at the surface (SFC) — similar to dashed magenta but associated with blue (towered) airport areas." },
        { q: "Fuzzy magenta vs fuzzy blue vs dashed magenta — what Class E floor does each represent?", a: "Fuzzy magenta = Class E starts at 700 AGL. Fuzzy blue = Class E starts at 1,200 AGL. Dashed magenta or blue = Class E starts at surface (SFC). In all cases, Class G is below the Class E floor." },
        { q: "Where does Class E airspace exist when there are no magenta or blue boundaries shown?", a: "Class E starts at 14,500 ft MSL by default in areas without specific lower boundaries. Class G exists below that floor." },
        { q: "At what altitude does Class E become Class A airspace?", a: "18,000 ft MSL. Class A extends from 18,000 ft MSL up to FL600 (60,000 ft)." },
        { q: "What does the solid blue line with inward tick marks (spokes) indicate on a sectional chart?", a: "Class D airspace boundary. The ticks point inward toward the airport. Class D is often associated with a part-time control tower." },
        { q: "What happens to Class D airspace when the control tower closes?", a: "It usually reverts to Class E or Class G airspace. Check the Chart Supplement (formerly A/FD) or NOTAMs for the specific airport." },
        { q: "How do VR/IR Military Training Route numbers tell you the altitude of operations?", a: "4-digit routes (e.g., VR1205, IR1234): operations at or below 1,500 ft AGL — high risk for sUAS! 3-digit routes (e.g., VR125, IR305): operations above 1,500 ft AGL." },
        { q: "You see 'VR1205' on a sectional chart. Should you be concerned as a sUAS pilot?", a: "Yes — 4-digit MTR routes mean military jets fly at or below 1,500 ft AGL at high speed. This is within sUAS operating altitude. Exercise extreme caution." },
        { q: "You see 'IR305' on a sectional chart. Does this affect sUAS operations?", a: "Less concern — 3-digit routes mean operations above 1,500 ft AGL, which is above the 400 ft Part 107 ceiling. Still be aware of military activity in the area." },
        { q: "In Class E airspace, what are the rules for IFR vs VFR aircraft?", a: "IFR aircraft: must have ATC clearance, are separated from other IFR traffic by ATC. VFR aircraft: do NOT need ATC clearance, do NOT need to talk to ATC, are responsible for their own see-and-avoid. sUAS must yield to all of them." },
        { q: "What is the difference between controlled and uncontrolled airspace?", a: "Controlled airspace (Class A/B/C/D/E): ATC provides services; IFR flights need clearance. Uncontrolled airspace (Class G): ATC does not provide separation services. For sUAS, Class B/C/D and Class E surface area require prior authorization; Class G does not." },
        { q: "What are NOTAMs and how should you check them before a sUAS flight?", a: "Notices to Airmen — alerts about temporary hazards, TFRs, runway closures, and airspace changes. Best way to check: obtain a weather briefing at 1800wxbrief.com, use the FAA NOTAM search, or the B4UFLY app." },
        { q: "What are Maximum Elevation Figures (MEF) on a sectional chart?", a: "The highest elevation in a quadrant (in thousands and hundreds of feet MSL), including terrain and obstacles plus a safety buffer. Used for obstacle clearance planning." },
        { q: "What are isogonic lines on a sectional chart and why do they matter?", a: "Lines of equal magnetic variation — important for converting between true and magnetic heading." },
        { q: "How do you convert between true heading and magnetic heading using magnetic variation?", a: "East is least (subtract), West is best (add). Example: True heading 090° with 10°W variation → magnetic heading = 090° + 10° = 100°." },
        { q: "On a sectional chart, what does an isogonic line labeled 5°W mean?", a: "Magnetic variation is 5° west — add 5° to true heading to get magnetic heading. Example: True 180° → Magnetic 185°." },
        { q: "What is the scale of a VFR sectional chart?", a: "1:500,000 — standard for VFR navigation." },
        { q: "What is the difference between a nautical mile and a statute mile?", a: "1 NM ≈ 1.15 SM (6,076 ft vs 5,280 ft). Part 107 visibility is measured in statute miles. Sectional charts use nautical miles for distance." },
        { q: "What is the relationship between knots and mph?", a: "1 knot = 1 nautical mile per hour ≈ 1.15 mph. Part 107 max speed: 87 knots = 100 mph." },
        { q: "What does a VOR symbol on a sectional chart indicate for sUAS pilots?", a: "VHF Omnidirectional Range navigation aid. Victor airways radiate from VORs — expect IFR traffic along these corridors." },
        { q: "What are Victor airways on a sectional chart and why do sUAS pilots care?", a: "Low-altitude IFR routes between VORs (below 18,000 MSL). Expect instrument traffic along these corridors — be aware when operating nearby." },
        { q: "What do obstruction symbols on a sectional chart tell sUAS pilots?", a: "Show man-made obstacles (towers, antennas, etc.). The number next to the symbol shows total height MSL, with AGL height in parentheses. A lightning bolt symbol means the obstacle is lighted." },
        { q: "What is the difference between AGL and MSL on a sectional chart?", a: "AGL = above ground level (height above terrain directly below). MSL = mean sea level (fixed reference). Charts show obstacle heights in MSL with AGL in parentheses. Part 107 altitude limit (400 ft) is AGL." },
        { q: "Why should sUAS pilots check VFR sectional chart effective dates?", a: "Airspace boundaries, frequencies, and obstacles can change between editions. An outdated chart may show incorrect airspace classifications or missing TFRs." },
        { q: "Why should drone pilots pay attention to charted heliports?", a: "Expect low-altitude helicopter traffic in the vicinity. Helicopters often fly below 1,000 ft AGL — right in the sUAS operating range." },
        { q: "How do you read an airport data block on a sectional chart?", a: "Example: 'XYZ (★L) 118.7 / GND 121.9 / ATIS 124.85 / Elev 32 / Class D'. The ★ before L means lighting is pilot-activated (not always on). 118.7 is the tower frequency (becomes CTAF when tower is closed; ★ before freq means part-time tower). GND = ground control. ATIS = recorded weather and airport info. Blue text = towered; magenta = non-towered." },
        { q: "On an airport data block, what does a star (★) before the lighting symbol 'L' mean?", a: "Lighting is available but not always on — it is pilot-activated (typically by clicking the mic on the CTAF frequency)." },
        { q: "On an airport data block, what does a star (★) before the tower frequency mean?", a: "The control tower is part-time. When the tower is closed, the tower frequency typically becomes the CTAF, and the airspace may revert to Class E or G." },
        { q: "What does 'AWOS-3 124.175' on a sectional chart mean?", a: "Automated Weather Observing System (type 3) broadcasting on frequency 124.175. You can listen on this frequency for current wind, visibility, ceiling, temperature, dew point, and altimeter setting at that airport." },
        { q: "What is ATIS and how does it differ from AWOS?", a: "ATIS (Automatic Terminal Information Service) is a recorded broadcast at towered airports — includes weather, active runways, and NOTAMs, updated by controllers. AWOS is automated and unattended — reports raw sensor data continuously." },
        // ═══════════════════════════════════════════════════════════════
        // Airport Operations
        // ═══════════════════════════════════════════════════════════════
        { q: "How are runway numbers determined at airports?", a: "Based on the magnetic heading, divided by 10 and rounded. Runway 13 points at 130° (between east and south = southeast). Runway 27 points at 270° (west). The opposite end of Runway 13 is Runway 31 (130° + 180° = 310°)." },
        { q: "Runway 13 — which direction is a plane heading when it lands or takes off on this runway?", a: "130° magnetic heading — that is southeast (90° is east, 180° is south, so 130° is between them). Aircraft approach and depart on approximately this heading." },
        { q: "Why do aircraft take off and land into the wind?", a: "Flying into the wind gives more airspeed over the wings for less groundspeed, resulting in a shorter takeoff roll and slower landing speed. Wind direction determines which runway is active." },
        { q: "What is a CTAF (Common Traffic Advisory Frequency)?", a: "The frequency used for self-announcing position and intentions at non-towered airports or at towered airports when the tower is closed. At a towered airport, the tower frequency typically becomes CTAF when the tower closes." },
        { q: "What is the standard (left) traffic pattern at airports?", a: "All turns in the pattern are to the left (counterclockwise when viewed from above). The aircraft flies: Upwind (departure climb) → Crosswind (turn left, perpendicular) → Downwind (parallel to runway, opposite direction) → Base (turn left, perpendicular) → Final (aligned with runway, into the wind to land)." },
        { q: "What does 'midfield left downwind' mean in a traffic pattern?", a: "Left traffic pattern = all turns are to the left, so the runway is on the pilot's left side during the downwind leg. 'Downwind' = flying parallel to the runway in the opposite direction of landing. 'Midfield' = halfway along the runway length. This is a common position report." },
        { q: "What are the legs of an airport traffic pattern in order?", a: "Upwind (departure, same direction as takeoff) → Crosswind (first turn, perpendicular to runway) → Downwind (parallel to runway, opposite landing direction) → Base (perpendicular to runway, descending) → Final (aligned with runway, into the wind to land)." },
        { q: "What is the see-and-avoid responsibility for sUAS remote pilots?", a: "The remote PIC must see manned aircraft and maneuver to avoid — sUAS must yield right-of-way to ALL aircraft, airborne vehicles, and launch/reentry vehicles at all times." },
        { q: "When aircraft are converging, who has the right of way?", a: "General rule: aircraft to the other's right has right of way. But sUAS must yield to ALL manned aircraft regardless of position." },
        { q: "What is the right-of-way rule when aircraft are head-on?", a: "Both alter course to the right (general aviation rule)." },
        { q: "What is the right-of-way rule for an overtaking aircraft?", a: "Overtaking aircraft alters course to the right to pass (general aviation rule)." },
        { q: "What should sUAS pilots know about wake turbulence near airports?", a: "Wing-tip vortices from large aircraft sink at 300–500 ft/min. They are most dangerous during slow, heavy, clean (no flaps) flight. Avoid flying behind and below departing/arriving large aircraft. Vortices settle below the flight path." },
        { q: "In the ICAO phonetic alphabet, what are the first three letters?", a: "Alpha, Bravo, Charlie." },
        { q: "What is the difference between an airport diagram and a sectional chart?", a: "Airport diagram shows detailed runway/taxiway layout for ground operations. Sectional chart shows the surrounding airspace, boundaries, terrain, and navigation context." },
        { q: "Should you always contact ATC before flying a sUAS near an airport?", a: "In controlled airspace (Class B/C/D, Class E surface), you MUST get prior authorization (e.g., LAANC). Even in Class G near an airport, good practice is to contact the tower or monitor CTAF to maintain awareness of traffic." },
        // ═══════════════════════════════════════════════════════════════
        // Weather
        // ═══════════════════════════════════════════════════════════════
        { q: "What is the difference between a METAR and a TAF weather report?", a: "METAR = current weather observation; TAF = terminal aerodrome forecast." },
        { q: "In a METAR, what does the visibility notation '10SM' mean?", a: "10 statute miles visibility." },
        { q: "In a METAR, what does the cloud notation FEW025 mean?", a: "Few clouds at 2,500 ft AGL." },
        { q: "In a METAR, what does the altimeter setting 'A2992' mean?", a: "Altimeter setting 29.92 inches of mercury." },
        { q: "How are TAF forecast periods structured (FM, BECMG, TEMPO)?", a: "Forecast periods with FM (from), BECMG (becoming), TEMPO (temporary) lines." },
        { q: "What is a SIGMET weather advisory and what conditions does it cover?", a: "Significant meteorological advisory — severe/extreme conditions (severe turbulence, icing, volcanic ash)." },
        { q: "What is an AIRMET weather advisory and what conditions does it cover?", a: "Moderate turbulence, icing, IFR conditions, sustained surface winds ≥ 30 knots." },
        { q: "What is a Convective SIGMET and what severe conditions does it warn about?", a: "Severe convection — tornadoes, severe thunderstorms, heavy precipitation." },
        { q: "What is the difference between stable and unstable air masses?", a: "Stable: resists vertical motion, smooth air. Unstable: cumulus development, turbulence, good visibility." },
        { q: "What are the weather differences between a cold front and a warm front?", a: "Cold front: steep, narrow band, gusty winds, cumulus. Warm front: widespread, stratiform clouds, lower visibility." },
        { q: "What are the primary hazards of thunderstorms for sUAS operations?", a: "Wind shear, hail, lightning, heavy rain, turbulence — avoid." },
