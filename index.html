<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Part 107 Flashcards</title>
  <style>
    :root {
      /* Skydio brand (see cloud/web/shared_ui, viz 3d viewer theme) */
      --skydio-blue: #0077ee;
      --skydio-blue-lightest: #c8dcff;
      --skydio-blue-lighter: #1eaaff;
      --skydio-blue-darker: #0564c8;
      --skydio-blue-darkest: #003264;
      --bg: #f5f9ff;
      --surface: #ffffff;
      --surface-hover: #e8f2ff;
      --border: #b8d4f0;
      --text: #003264;
      --muted: #4d6b8c;
      --accent: var(--skydio-blue);
      --accent-dim: var(--skydio-blue-darker);
      --card-front: #ffffff;
      --card-front-tint: #f0f7ff;
      --card-back: #ffffff;
      --card-back-tint: #e8f4ff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: linear-gradient(165deg, #ffffff 0%, var(--bg) 45%, #e8f2ff 100%);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1rem;
    }

    h1 {
      font-size: 1.25rem;
      font-weight: 600;
      margin: 0 0 0.25rem;
      letter-spacing: -0.02em;
      color: var(--skydio-blue);
    }

    .sub {
      color: var(--muted);
      font-size: 0.85rem;
      margin-bottom: 1rem;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: center;
      justify-content: center;
      margin-bottom: 1rem;
      max-width: 42rem;
    }

    button {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.45rem 0.85rem;
      border-radius: 8px;
      font-size: 0.875rem;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    button:hover {
      background: var(--surface-hover);
      border-color: var(--skydio-blue);
    }

    button:active {
      transform: scale(0.98);
    }

    button.primary {
      background: var(--skydio-blue);
      border-color: var(--skydio-blue-darker);
      color: #fff;
    }

    button.primary:hover {
      background: var(--skydio-blue-darker);
      border-color: var(--skydio-blue-darkest);
      color: #fff;
    }

    .progress {
      font-size: 0.8rem;
      color: var(--muted);
      width: 100%;
      text-align: center;
      margin-bottom: 0.75rem;
    }

    .wrap {
      perspective: 1200px;
      width: min(100%, 42rem);
      min-height: 220px;
    }

    .card {
      position: relative;
      width: 100%;
      min-height: 220px;
      cursor: pointer;
      transform-style: preserve-3d;
      transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .card.flipped {
      transform: rotateY(180deg);
    }

    .face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      border-radius: 14px;
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: stretch;
      justify-content: flex-start;
      padding: 1rem 1.35rem 1.25rem;
      line-height: 1.45;
    }

    .face-label {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 0.45rem;
      text-align: left;
      flex: 0 0 auto;
    }

    .face-body {
      margin: 0;
      flex: 1 1 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: clamp(1.2rem, 3.8vw, 1.55rem);
      min-height: 0;
    }

    .face.front {
      background: linear-gradient(145deg, var(--card-front), var(--card-front-tint));
      color: var(--text);
      box-shadow: 0 6px 28px rgba(0, 50, 100, 0.1);
    }

    .face.back {
      background: linear-gradient(145deg, var(--card-back), var(--card-back-tint));
      transform: rotateY(180deg);
      color: var(--text);
      overflow: hidden;
      box-shadow: 0 6px 28px rgba(0, 50, 100, 0.1);
    }

    .back-inner {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      width: 100%;
      max-height: 100%;
      min-height: 0;
      overflow-y: auto;
      text-align: left;
    }

    .answer-text {
      margin: 0;
      text-align: center;
      font-size: clamp(1.12rem, 3.4vw, 1.45rem);
      line-height: 1.45;
      flex: 0 0 auto;
    }

    .refs {
      font-size: clamp(0.82rem, 2.2vw, 0.95rem);
      line-height: 1.4;
      border-top: 1px solid var(--border);
      padding-top: 0.75rem;
      color: var(--muted);
      flex: 0 1 auto;
      min-height: 0;
    }

    .refs-title {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin: 0 0 0.4rem;
      color: var(--muted);
    }

    .refs ul {
      margin: 0;
      padding-left: 1.1rem;
    }

    .refs li {
      margin: 0.25rem 0;
    }

    .refs a {
      color: var(--skydio-blue-darker);
      text-decoration: none;
      word-break: break-word;
      font-weight: 500;
    }

    .refs a:hover {
      text-decoration: underline;
      color: var(--skydio-blue);
    }

    .hint {
      margin-top: 0.75rem;
      font-size: 0.75rem;
      color: var(--muted);
      text-align: center;
    }

    .search {
      width: min(100%, 42rem);
      margin-bottom: 0.75rem;
    }

    .search input {
      width: 100%;
      padding: 0.5rem 0.75rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 0.9rem;
      box-shadow: 0 1px 3px rgba(0, 50, 100, 0.06);
    }

    .search input:focus {
      outline: 2px solid var(--skydio-blue-lightest);
      border-color: var(--skydio-blue);
    }

    .search input::placeholder {
      color: var(--muted);
    }

    kbd {
      font-family: inherit;
      font-size: 0.7rem;
      padding: 0.1rem 0.35rem;
      border: 1px solid var(--skydio-blue-lightest);
      border-radius: 4px;
      background: #ffffff;
      color: var(--skydio-blue-darkest);
    }
  </style>
</head>

<body>
  <h1>Part 107 flashcards</h1>
  <p class="sub">FAA small UAS (sUAS) — tap card or press <kbd>Space</kbd> to flip · <kbd>←</kbd><kbd>→</kbd> navigate ·
    <kbd>S</kbd> shuffle · <kbd>R</kbd> random · references (eCFR, FAA, PHAK) on the back
  </p>
  <div class="search"><input type="search" id="filter" placeholder="Filter cards (question or answer)…"
      autocomplete="off" /></div>
  <div class="progress" id="progress"></div>
  <div class="toolbar">
    <button type="button" id="prev">← Prev</button>
    <button type="button" class="primary" id="flip">Flip</button>
    <button type="button" id="next">Next →</button>
    <button type="button" id="shuffle">Shuffle deck</button>
    <button type="button" id="random">Random card</button>
  </div>
  <div class="wrap">
    <div class="card" id="card" role="button" tabindex="0" aria-label="Flashcard. Click to flip.">
      <div class="face front">
        <span class="face-label">Question</span>
        <p class="face-body" id="q"></p>
      </div>
      <div class="face back">
        <div class="back-inner">
          <span class="face-label">Answer</span>
          <p class="answer-text" id="a"></p>
          <div class="refs" id="refs" aria-label="Reference literature"></div>
        </div>
      </div>
    </div>
  </div>
  <p class="hint" id="count"></p>

          ]
        },
        {

            { label: "FAA — Part 107 waivers", url: "https://www.faa.gov/uas/commercial_operators/part_107_waivers" },

          re: /\b91\.119\b|minimum.*safe.*altitude/i, links: [
            { label: "14 CFR §91.119 — Minimum safe altitudes", url: LIT.s91_119 },
          ]
        },
      ];

      const DEFAULT_REFS = [
        { label: "14 CFR Part 107 (eCFR)", url: LIT.part107 },
        { label: "FAA — Remote Pilot ACS (PDF)", url: LIT.acs },
        { label: "Pilot’s Handbook of Aeronautical Knowledge (PDF)", url: LIT.phak },
      ];

      function collectRefs(q, a, extra) {
        const blob = (q + " " + a).toLowerCase();
        const seen = {};
        const out = [];
        function add(link) {
          if (!link || !link.url) return;
          if (seen[link.url]) return;
          seen[link.url] = true;
          out.push(link);
        }
        if (extra && Array.isArray(extra)) {
          extra.forEach(add);
        }
        for (let i = 0; i < REF_RULES.length; i++) {
          const rule = REF_RULES[i];
          if (rule.re.test(blob)) {
            for (let j = 0; j < rule.links.length; j++) add(rule.links[j]);
          }
        }
        if (out.length === 0) {
          DEFAULT_REFS.forEach(add);
        } else {
          let k = 0;
          while (out.length < 2 && k < DEFAULT_REFS.length) {
            add(DEFAULT_REFS[k++]);
          }
        }
        return out.slice(0, 8);
      }

      function escapeHtml(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function renderRefsHtml(links) {
        if (!links.length) return "";
        let html = "<p class=\"refs-title\">References</p><ul>";
        for (let i = 0; i < links.length; i++) {
          const L = links[i];
          const lab = escapeHtml(L.label);
          const u = escapeHtml(L.url);
          html += "<li><a href=\"" + u + "\" target=\"_blank\" rel=\"noopener noreferrer\">" + lab + "</a></li>";
        }
        html += "</ul>";
        return html;
      }

      let deck = CARDS_CLEAN.slice();
      let index = 0;
      let filtered = deck;

      const elCard = document.getElementById("card");
      const elQ = document.getElementById("q");
      const elA = document.getElementById("a");
      const elRefs = document.getElementById("refs");
      const elProgress = document.getElementById("progress");
      const elCount = document.getElementById("count");
      const elFilter = document.getElementById("filter");

      function show() {
        if (filtered.length === 0) {
          elQ.textContent = "No cards match filter.";
          elA.textContent = "Clear the search box.";
          elRefs.innerHTML = "";
          elProgress.textContent = "0 / 0";
          elCount.textContent = "Total in deck: " + deck.length;
          elCard.classList.remove("flipped");
          return;
        }
        if (index >= filtered.length) index = filtered.length - 1;
        if (index < 0) index = 0;
        const c = filtered[index];
        elQ.textContent = c.q;
        elA.textContent = c.a;
        const links = collectRefs(c.q, c.a, c.links);
        elRefs.innerHTML = renderRefsHtml(links);
        elProgress.textContent = index + 1 + " / " + filtered.length + " (showing)";
        elCount.textContent = "Full deck: " + deck.length + " cards · " + CARDS_CLEAN.length + " topics";
        elCard.classList.remove("flipped");
      }

      function applyFilter() {
        const q = elFilter.value.trim().toLowerCase();
        if (!q) {
          filtered = deck.slice();
        } else {
          filtered = deck.filter(function (c) {
            return (
              c.q.toLowerCase().indexOf(q) !== -1 ||
              c.a.toLowerCase().indexOf(q) !== -1
            );
          });
        }
        index = 0;
        show();
      }

      function flip() {
        if (filtered.length === 0) return;
        elCard.classList.toggle("flipped");
      }

      function next() {
        if (filtered.length === 0) return;
        index = (index + 1) % filtered.length;
        elCard.classList.remove("flipped");
        show();
      }

      function prev() {
        if (filtered.length === 0) return;
        index = (index - 1 + filtered.length) % filtered.length;
        elCard.classList.remove("flipped");
        show();
      }

      function shuffle() {
        for (let i = deck.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          const t = deck[i];
          deck[i] = deck[j];
          deck[j] = t;
        }
        applyFilter();
      }

      function randomCard() {
        if (filtered.length === 0) return;
        index = Math.floor(Math.random() * filtered.length);
        elCard.classList.remove("flipped");
        show();
      }

      document.getElementById("flip").addEventListener("click", function (e) {
        e.stopPropagation();
        flip();
      });
      document.getElementById("next").addEventListener("click", function (e) {
        e.stopPropagation();
        next();
      });
      document.getElementById("prev").addEventListener("click", function (e) {
        e.stopPropagation();
        prev();
      });
      document.getElementById("shuffle").addEventListener("click", shuffle);
      document.getElementById("random").addEventListener("click", randomCard);

      elRefs.addEventListener("click", function (e) {
        e.stopPropagation();
      });

      elCard.addEventListener("click", flip);
      elCard.addEventListener("keydown", function (e) {
        if (e.key === " " || e.key === "Enter") {
          e.preventDefault();
          flip();
        }
      });

      elFilter.addEventListener("input", applyFilter);

      document.addEventListener("keydown", function (e) {
        if (e.target === elFilter) return;
        if (e.key === " " || e.key === "Spacebar") {
          e.preventDefault();
          flip();
        } else if (e.key === "ArrowRight") next();
        else if (e.key === "ArrowLeft") prev();
        else if (e.key === "s" || e.key === "S") shuffle();
        else if (e.key === "r" || e.key === "R") randomCard();
      });

      applyFilter();
    })();
  </script>
