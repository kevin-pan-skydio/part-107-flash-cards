<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Part 107 Flashcards</title>
  <style>
    :root {
      /* Skydio brand (see cloud/web/shared_ui, viz 3d viewer theme) */
      --skydio-blue: #0077ee;
      --skydio-blue-lightest: #c8dcff;
      --skydio-blue-lighter: #1eaaff;
      --skydio-blue-darker: #0564c8;
      --skydio-blue-darkest: #003264;
      --bg: #f5f9ff;
      --surface: #ffffff;
      --surface-hover: #e8f2ff;
      --border: #b8d4f0;
      --text: #003264;
      --muted: #4d6b8c;
      --accent: var(--skydio-blue);
      --accent-dim: var(--skydio-blue-darker);
      --card-front: #ffffff;
      --card-front-tint: #f0f7ff;
      --card-back: #ffffff;
      --card-back-tint: #e8f4ff;
    }

    * {
      box-sizing: border-box;
    }

    /* HTML hidden must override component rules like .exam-hud { display: flex } */
    [hidden] {
      display: none !important;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: linear-gradient(165deg, #ffffff 0%, var(--bg) 45%, #e8f2ff 100%);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1rem;
    }

    h1 {
      font-size: 1.25rem;
      font-weight: 600;
      margin: 0 0 0.25rem;
      letter-spacing: -0.02em;
      color: var(--skydio-blue);
    }

    .sub {
      color: var(--muted);
      font-size: 0.85rem;
      margin-bottom: 1rem;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: center;
      justify-content: center;
      margin-bottom: 1rem;
      max-width: 42rem;
    }

    button {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.45rem 0.85rem;
      border-radius: 8px;
      font-size: 0.875rem;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    button:hover {
      background: var(--surface-hover);
      border-color: var(--skydio-blue);
    }

    button:active {
      transform: scale(0.98);
    }

    button.primary {
      background: var(--skydio-blue);
      border-color: var(--skydio-blue-darker);
      color: #fff;
    }

    button.primary:hover {
      background: var(--skydio-blue-darker);
      border-color: var(--skydio-blue-darkest);
      color: #fff;
    }

    .progress {
      font-size: 0.8rem;
      color: var(--muted);
      width: 100%;
      text-align: center;
      margin-bottom: 0.75rem;
    }

    .wrap {
      perspective: 1200px;
      width: min(100%, 42rem);
      min-height: 220px;
    }

    .card {
      position: relative;
      width: 100%;
      min-height: 220px;
      cursor: pointer;
      transform-style: preserve-3d;
      transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
      display: grid;
      grid-template-columns: 1fr;
      grid-template-rows: minmax(220px, auto);
    }

    .card.flipped {
      transform: rotateY(180deg);
    }

    .face {
      grid-area: 1 / 1;
      position: relative;
      width: 100%;
      min-height: 220px;
      backface-visibility: hidden;
      border-radius: 14px;
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: stretch;
      justify-content: flex-start;
      padding: 1rem 1.35rem 1.25rem;
      line-height: 1.45;
      box-sizing: border-box;
    }

    .face-label {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 0.45rem;
      text-align: left;
      flex: 0 0 auto;
    }

    .face-body {
      margin: 0;
      flex: 1 1 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: clamp(1.2rem, 3.8vw, 1.55rem);
      min-height: 0;
    }

    .face.front {
      background: linear-gradient(145deg, var(--card-front), var(--card-front-tint));
      color: var(--text);
      box-shadow: 0 6px 28px rgba(0, 50, 100, 0.1);
    }

    .face.back {
      background: linear-gradient(145deg, var(--card-back), var(--card-back-tint));
      transform: rotateY(180deg);
      color: var(--text);
      box-shadow: 0 6px 28px rgba(0, 50, 100, 0.1);
    }

    .back-inner {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      width: 100%;
      text-align: left;
    }

    .answer-text {
      margin: 0;
      text-align: center;
      font-size: clamp(1.12rem, 3.4vw, 1.45rem);
      line-height: 1.45;
      flex: 0 0 auto;
    }

    .refs {
      font-size: clamp(0.82rem, 2.2vw, 0.95rem);
      line-height: 1.4;
      border-top: 1px solid var(--border);
      padding-top: 0.75rem;
      color: var(--muted);
      flex: 0 0 auto;
    }

    .refs-title {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin: 0 0 0.4rem;
      color: var(--muted);
    }

    .refs ul {
      margin: 0;
      padding-left: 1.1rem;
    }

    .refs li {
      margin: 0.25rem 0;
    }

    .refs a {
      color: var(--skydio-blue-darker);
      text-decoration: none;
      word-break: break-word;
      font-weight: 500;
    }

    .refs a:hover {
      text-decoration: underline;
      color: var(--skydio-blue);
    }

    .hint {
      margin-top: 0.75rem;
      font-size: 0.75rem;
      color: var(--muted);
      text-align: center;
    }

    .search {
      width: min(100%, 42rem);
      margin-bottom: 0.75rem;
    }

    .search input {
      width: 100%;
      padding: 0.5rem 0.75rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 0.9rem;
      box-shadow: 0 1px 3px rgba(0, 50, 100, 0.06);
    }

    .search input:focus {
      outline: 2px solid var(--skydio-blue-lightest);
      border-color: var(--skydio-blue);
    }

    .search input::placeholder {
      color: var(--muted);
    }

    kbd {
      font-family: inherit;
      font-size: 0.7rem;
      padding: 0.1rem 0.35rem;
      border: 1px solid var(--skydio-blue-lightest);
      border-radius: 4px;
      background: #ffffff;
      color: var(--skydio-blue-darkest);
    }

    .exam-setup {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 0.5rem 0.75rem;
      width: min(100%, 42rem);
      margin-bottom: 0.75rem;
      padding: 0.65rem 0.85rem;
      border-radius: 10px;
      border: 1px dashed var(--border);
      background: rgba(255, 255, 255, 0.7);
      font-size: 0.875rem;
      color: var(--text);
    }

    .exam-setup label {
      font-weight: 600;
      color: var(--skydio-blue-darkest);
    }

    .exam-setup select {
      padding: 0.35rem 0.5rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 0.875rem;
    }

    .exam-hud {
      width: min(100%, 42rem);
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
      padding: 0.5rem 0.75rem;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--skydio-blue-darkest), #004a8c);
      color: #fff;
      font-size: 0.85rem;
      font-weight: 500;
    }

    .exam-hud span {
      flex: 1 1 auto;
      min-width: 0;
    }

    .exam-hud button {
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.45);
      color: #fff;
      flex-shrink: 0;
    }

    .exam-hud button:hover {
      background: rgba(255, 255, 255, 0.28);
      border-color: #fff;
    }

    .exam-grade {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      justify-content: center;
      margin-top: 0.5rem;
      margin-bottom: 0.5rem;
      width: min(100%, 42rem);
    }

    .exam-grade #examNextBtn {
      min-width: 12rem;
    }

    .exam-results {
      width: min(100%, 42rem);
      margin-bottom: 1rem;
      padding: 1.25rem 1.5rem;
      border-radius: 14px;
      border: 2px solid var(--skydio-blue);
      background: var(--surface);
      text-align: center;
      box-shadow: 0 8px 32px rgba(0, 50, 100, 0.12);
    }

    .exam-results h2 {
      margin: 0 0 0.5rem;
      font-size: 1.35rem;
      color: var(--skydio-blue);
    }

    .exam-results .exam-stat {
      font-size: 1.1rem;
      margin: 0.35rem 0;
      color: var(--text);
    }

    .exam-results .exam-pct {
      font-size: 2rem;
      font-weight: 700;
      color: var(--skydio-blue-darkest);
      margin: 0.5rem 0;
    }

    body.exam-active .search,
    body.exam-active .search input {
      pointer-events: none;
      opacity: 0.45;
    }

    body.exam-active .toolbar button:not(#examEnd):not(.exam-grade-btn) {
      opacity: 0.5;
      pointer-events: none;
    }

    body.exam-active .toolbar button#flip:not(:disabled) {
      opacity: 1;
      pointer-events: auto;
    }

    .card.no-flip {
      cursor: default;
    }

    .exam-mc {
      width: min(100%, 42rem);
      margin-bottom: 0.75rem;
    }

    .exam-mc-label {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--skydio-blue-darkest);
      margin: 0 0 0.5rem;
    }

    .exam-mc-options {
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
    }

    .exam-choice-btn {
      text-align: left;
      padding: 0.65rem 0.85rem;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 0.9rem;
      line-height: 1.35;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    .exam-choice-btn:hover:not(:disabled) {
      border-color: var(--skydio-blue);
      background: var(--surface-hover);
    }

    .exam-choice-btn:disabled {
      cursor: default;
      opacity: 1;
    }

    .exam-choice-btn.exam-choice-correct {
      border-color: #0a7d4a;
      background: #e8f8ef;
      color: #064a2e;
    }

    .exam-choice-btn.exam-choice-wrong {
      border-color: #c94c4c;
      background: #ffeef0;
      color: #7a1a1a;
    }
  </style>
</head>

<body>
  <h1>Part 107 flashcards</h1>
  <p class="sub" id="subLine">FAA small UAS (sUAS) — tap card or press <kbd>Space</kbd> to flip ·
    <kbd>←</kbd><kbd>→</kbd> navigate ·
    <kbd>S</kbd> shuffle · <kbd>R</kbd> random · references (eCFR, FAA, PHAK) on the back
  </p>
  <div class="exam-setup" id="examSetup">
    <label for="examLength">Practice exam</label>
    <select id="examLength" aria-label="Number of practice exam questions">
      <option value="10">10 questions</option>
      <option value="25" selected>25 questions</option>
      <option value="50">50 questions</option>
      <option value="60">60 questions</option>
    </select>
    <button type="button" class="primary" id="examStart">Start exam</button>
  </div>
  <div class="exam-hud" id="examHud" hidden>
    <span id="examHudText"></span>
    <button type="button" id="examEnd">End exam</button>
  </div>
  <div class="exam-results" id="examResults" hidden>
    <h2>Exam complete</h2>
    <p class="exam-pct" id="examResultPct"></p>
    <p class="exam-stat" id="examResultDetail"></p>
    <p class="exam-stat" id="examResultTime"></p>
    <button type="button" class="primary" id="examDismiss">Back to study</button>
  </div>
  <div class="search"><input type="search" id="filter" placeholder="Filter cards (question or answer)…"
      autocomplete="off" /></div>
  <div class="progress" id="progress"></div>
  <div class="toolbar" id="mainToolbar">
    <button type="button" id="prev">← Prev</button>
    <button type="button" class="primary" id="flip">Flip</button>
    <button type="button" id="next">Next →</button>
    <button type="button" id="shuffle">Shuffle deck</button>
    <button type="button" id="random">Random card</button>
  </div>
  <div class="exam-mc" id="examMc" hidden>
    <p class="exam-mc-label" id="examMcLabel">Choose the best answer</p>
    <div class="exam-mc-options" id="examMcOptions"></div>
  </div>
  <div class="wrap" id="cardWrap">
    <div class="card" id="card" role="button" tabindex="0" aria-label="Flashcard. Click to flip.">
      <div class="face front">
        <span class="face-label">Question</span>
        <p class="face-body" id="q"></p>
      </div>
      <div class="face back">
        <div class="back-inner">
          <span class="face-label">Answer</span>
          <p class="answer-text" id="a"></p>
          <div class="refs" id="refs" aria-label="Reference literature"></div>
        </div>
      </div>
    </div>
  </div>
  <div class="exam-grade" id="examGrade" hidden>
    <button type="button" class="primary exam-grade-btn" id="examNextBtn">Next question →</button>
  </div>
  <p class="hint" id="count"></p>

  <script>
    (function () {
      const CARDS = [
        { q: "Maximum takeoff weight for a small UAS under Part 107?", a: "55 pounds (25 kg) including everything onboard at takeoff." },
        { q: "Must a Part 107 pilot hold a manned aircraft pilot certificate?", a: "No. You need a Remote Pilot Certificate (passed knowledge test) or be under direct supervision of someone who holds it." },
        { q: "What certificate is required to act as remote PIC under Part 107?", a: "Remote Pilot Certificate with a small UAS rating (or sport/recreational pilot with applicable privileges per 107.12 in limited cases — most operators use Remote Pilot)." },
        { q: "Standard maximum altitude AGL for Part 107?", a: "400 feet AGL unless in the immediate vicinity of a structure, then up to 400 feet above the structure’s uppermost height." },
        { q: "Flying near a 200 ft tower — how high may you fly?", a: "Up to 400 ft above the tower (600 ft AGL in that immediate vicinity), if the operation stays within the structure’s immediate vicinity." },
        { q: "Define 'immediate vicinity' of a structure (practical rule of thumb).", a: "Close enough that the flight is necessary to inspect/work on the structure — stay within a reasonable lateral distance; FAA emphasizes the operation must be tied to the structure." },
        { q: "Minimum weather visibility for Part 107?", a: "3 statute miles from your control station." },
        { q: "Minimum distance from clouds (below 10,000 ft MSL)?", a: "500 feet below clouds, 2,000 feet horizontally from clouds." },
        { q: "Can you fly in Class B airspace under Part 107?", a: "Only with prior authorization (e.g., LAANC or other FAA authorization)." },
        { q: "Class C airspace — Part 107 requirement?", a: "Prior authorization required before operating in controlled airspace." },
        { q: "Class D airspace — Part 107 requirement?", a: "Prior authorization required." },
        { q: "Class E surface area around an airport — Part 107?", a: "Generally requires authorization if it’s controlled airspace designated for the airport." },
        { q: "Class G (uncontrolled) — need LAANC?", a: "Usually no authorization needed unless other restrictions (TFR, etc.) apply." },
        { q: "What is LAANC?", a: "Low Altitude Authorization and Notification Capability — near-real-time authorization in controlled airspace." },
        { q: "Maximum groundspeed under Part 107?", a: "100 mph (87 knots)." },
        { q: "Visual line of sight (VLOS) — what must the remote PIC ensure?", a: "The small UAS must be visible to the remote PIC or visual observer without binoculars (except corrective lenses)." },
        { q: "Can a visual observer (VO) satisfy VLOS?", a: "Yes, if coordinated with the remote PIC and communication is maintained." },
        { q: "How many sUAS may one remote PIC operate at once?", a: "One at a time (single aircraft per remote PIC)." },
        { q: "Yield right-of-way — to whom?", a: "All manned aircraft; the sUAS must give way." },
        { q: "Operations from a moving vehicle — allowed?", a: "Generally not in populated areas; allowed in sparsely populated areas only if it does not transport property for hire (special rules apply — know the nuance)." },
        { q: "Operations from a moving aircraft?", a: "Prohibited for Part 107 (with very narrow exceptions not typical for standard ops)." },
        { q: "Careless or reckless operation?", a: "Prohibited — must not endanger life or property." },
        { q: "Flying under the influence?", a: "Prohibited — no drugs/alcohol that impair safe operation." },
        { q: "When must you report an accident to the FAA?", a: "Within 10 days if any person suffers serious injury, loss of consciousness, or property damage (excluding the sUAS) exceeds $500 (verify current threshold in 107.9)." },
        { q: "Serious injury reporting threshold concept?", a: "Reportable if it meets the regulatory definition of serious injury or the property damage monetary threshold." },
        { q: "Remote ID — when required for standard Part 107?", a: "Most operations require Standard Remote ID or broadcast from FAA-Recognized Identification Area (FRIA) per current rules — check aircraft compliance." },
        { q: "What does Standard Remote ID broadcast?", a: "ID, location, altitude, velocity, takeoff location, remote PIC status, etc. (per FAA remote ID rule)." },
        { q: "Night operations — prior to recent updates, were they allowed?", a: "Historically required waiver; now allowed under specific conditions (anti-collision lighting visible for 3 statute miles, etc.)." },
        { q: "Anti-collision lighting for night operations — visibility?", a: "Must be visible for at least 3 statute miles (per current Part 107 night rules)." },
        { q: "Operations over people — categories?", a: "Operations over people rules categorize exposure (e.g., Category 1–4) with aircraft performance/fragility requirements — know your aircraft’s category." },
        { q: "Sustained flight over open-air assemblies?", a: "Generally prohibited unless meeting specific operations-over-people requirements / applicable category." },
        { q: "What is a TFR?", a: "Temporary Flight Restriction — must be checked and complied with (NOTAMs)." },
        { q: "Where do you check TFRs and NOTAMs?", a: "FAA NOTAM system, briefing tools (FAA NOTAM Search, apps that use official data)." },

        { q: "Prohibited area (P-####)?", a: "Flight prohibited — no operations without specific permission." },
        { q: "National Security UAS flight restrictions (e.g., stadiums)?", a: "Temporary flight limits around stadiums during events — check FAA stadium TFR guidance." },
        { q: "Sectional chart — magenta vs blue airport symbols?", a: "Magenta = non-towered (Class E surface or other); blue = towered (often Class D/C/B context) — always read the chart legend." },
        { q: "Class E airspace starting at 700 ft AGL (depicted)?", a: "Shown with fuzzy magenta boundary; understand floor vs ceiling from legend." },
        { q: "Density altitude — why it matters for sUAS?", a: "Higher density altitude = thinner air → reduced performance, shorter battery life, less lift margin." },
        { q: "Load factor in turns?", a: "Banking increases load — batteries and motors work harder; stall margins apply to fixed-wing thinking; multirotor power margin matters." },
        { q: "Wind gradient near obstacles?", a: "Turbulence and rotor/wake effects near buildings, trees, terrain — expect gusts." },
        { q: "IMSAFE checklist — what does I stand for?", a: "Illness — self-assessment for fitness to fly." },
        { q: "IMSAFE — M?", a: "Medication — side effects affecting judgment or alertness." },

        { q: "Spatial disorientation — risk?", a: "Flying VLOS at distance — easy to misjudge altitude/position; use observers and clear references." },
        { q: "METAR vs TAF?", a: "METAR = current observation; TAF = forecast." },
        { q: "VFR minimums in Class G below 1,200 ft AGL (day) — aircraft?", a: "1 sm visibility, clear of clouds (below 10,000 ft) — sUAS uses 3 sm / cloud clearance per 107; don’t confuse manned vs sUAS minimums." },
        { q: "Why memorize both manned VFR and Part 107 minimums?", a: "You must see and avoid manned aircraft operating under their rules; integrate with traffic." },
        { q: "ATC contact — when might you call?", a: "If instructed, in emergencies, or when operating in coordinated environments — follow local procedures." },
        { q: "Emergency — PIC authority?", a: "Remote PIC may deviate from any rule to the extent necessary to meet that emergency." },
        { q: "Preflight inspection — what must you verify?", a: "Aircraft is in condition for safe operation (airframe, props, motors, battery, firmware, control links)." },
        { q: "Lost link procedures?", a: "Programmed behavior (RTH, hover, land) — must be predictable and safe." },
        { q: "EMI — Electromagnetic interference?", a: "Power lines, transmitters, metal structures can affect compass/GPS — plan mitigation." },
        { q: "Geofencing / software limits?", a: "Tools to help compliance; PIC remains responsible for regulatory compliance." },
        { q: "Hazardous attitudes (ADM) — Anti-authority?", a: "'Rules don’t apply to me' — dangerous for aviation decision-making." },

        { q: "ADM — Invulnerability?", a: "'It won’t happen to me.'" },
        { q: "ADM — Macho?", a: "Taking risks to prove skill." },
        { q: "ADM — Resignation?", a: "'What’s the use' — giving up on safe options." },
        { q: "DECIDE model — first step?", a: "Detect the need for a decision." },
        { q: "5 hazardous attitudes — antidotes?", a: "Each has a stated antidote (e.g., follow rules, not so fast, it could happen to me, taking chances is foolish, I’m not helpless)." },
        { q: "Aeronautical chart symbology — maximum elevation figures (MEF)?", a: "Highest elevation in a quadrant quadrant — obstacle clearance planning." },

        { q: "True vs magnetic heading?", a: "Convert using magnetic variation for navigation with sectional." },
        { q: "GPS 'mode' confusion (GPS vs ATTI)?", a: "Understand failure modes — ATTI mode without GPS may drift." },
        { q: "Battery storage — general guidance?", a: "Follow manufacturer; avoid extreme temps; storage charge ~40–60% for LiPo longevity (manufacturer-specific)." },

        { q: "Center of gravity on sUAS?", a: "Affects stability — improper payload attachment can cause loss of control." },
        { q: "Wake turbulence — relevance?", a: "Low for small drones vs large aircraft, but rotor wash near helipads/helicopters matters." },
        { q: "Right-of-way near airport traffic pattern?", a: "Stay clear; yield; do not interfere with manned traffic." },
        { q: "Flying in national parks?", a: "NPS generally prohibits launching/landing in parks; takeoff/landing rules vary by jurisdiction — check agency rules." },
        { q: "State/local drone laws?", a: "Must comply where not preempted; FAA has broad airspace authority — know interplay." },
        { q: "Part 107 vs recreational (Exception)?", a: "Recreational uses §44809 with TRUST and community guidelines; Part 107 is commercial / broader operational flexibility." },

      function collectRefs(q, a, extra) {
        const blob = (q + " " + a).toLowerCase();
        const seen = {};
        const out = [];
        function add(link) {
          if (!link || !link.url) return;
          if (seen[link.url]) return;
          seen[link.url] = true;
          out.push(link);
        }
        if (extra && Array.isArray(extra)) {
          extra.forEach(add);
        }
        for (let i = 0; i < REF_RULES.length; i++) {
          const rule = REF_RULES[i];
          if (rule.re.test(blob)) {
            for (let j = 0; j < rule.links.length; j++) add(rule.links[j]);
          }
        }
        if (out.length === 0) {
          DEFAULT_REFS.forEach(add);
        } else {
          let k = 0;
          while (out.length < 2 && k < DEFAULT_REFS.length) {
            add(DEFAULT_REFS[k++]);
          }
        }
        return out.slice(0, 8);
      }

          html += "<li><a href=\"" + u + "\" target=\"_blank\" rel=\"noopener noreferrer\">" + lab + "</a></li>";

        return html;

      /** Uniform index in [0, maxExclusive), preferring crypto RNG when available. */
      function randomUintBelow(maxExclusive) {
        if (maxExclusive <= 0) return 0;
        if (typeof crypto !== "undefined" && crypto.getRandomValues) {
          const buf = new Uint32Array(1);
          crypto.getRandomValues(buf);
          return buf[0] % maxExclusive;
        }
        return Math.floor(Math.random() * maxExclusive);
      }

      function shuffleArray(arr) {
        const a = arr.slice();
        for (let i = a.length - 1; i > 0; i--) {
          const j = randomUintBelow(i + 1);
          const t = a[i];
          a[i] = a[j];
          a[j] = t;
        }
        return a;
      }

      function shuffleDeckInPlace(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
          const j = randomUintBelow(i + 1);
          const t = arr[i];
          arr[i] = arr[j];
          arr[j] = t;
        }
        return arr;
      }

      /**
       * Shuffle answer positions so letter memorization does not match the bank file.
       */
      function prepareExamBankItem(item) {
        const pairs = item.choices.map(function (text, i) {
          return { text: text, isCorrect: i === item.correctIndex };
        });
        const shuffled = shuffleArray(pairs);
        let correctIndex = -1;
        for (let j = 0; j < 4; j++) {
          if (shuffled[j].isCorrect) correctIndex = j;
        }
        return {
          q: item.q,
          a: item.a,
          links: item.links,
          sources: item.sources,
          choices: shuffled.map(function (p) {
            return p.text;
          }),
          correctIndex: correctIndex
        };
      }

      function updateExamHud() {
        if (!examActive || !examList.length) return;
        const elapsed = Math.floor((Date.now() - examStartMs) / 1000);
        elExamHudText.textContent =
          "Q " +
          (examIdx + 1) +
          " / " +
          examList.length +
          " · " +
          examCorrect +
          " correct · " +
          formatElapsed(elapsed) +
          " elapsed";
      }

      function showExamQuestion() {
        elExamResults.hidden = true;
        elCardWrap.hidden = false;
        if (examIdx >= examList.length) {
          finishExamWithResults();
          return;
        }
        elExamMc.hidden = false;
        const c = examList[examIdx];
        elQ.textContent = c.q;
        elA.textContent = "";
        elRefs.innerHTML = "";
        elCard.classList.remove("flipped");
        elCard.classList.remove("no-flip");
        examAnswerShown = false;
        elExamGrade.hidden = true;
        elFlip.disabled = true;
        elFlip.textContent = "Multiple choice";
        examCurrentItem = prepareExamBankItem(c);
        examMcCorrectIndex = examCurrentItem.correctIndex;
        renderExamMcOptions(examCurrentItem.choices, onExamMcSelect);
        elProgress.textContent = "Exam · question " + (examIdx + 1) + " of " + examList.length;
        elCount.textContent =
          "FAA-style practice bank · Pick A–D or keys 1–4.";
        updateExamHud();
      }

      function onExamMcSelect(pickedIndex) {
        if (!examActive || examAnswerShown || examIdx >= examList.length) return;
        const c = examCurrentItem;
        if (!c) return;
        const ok = pickedIndex === examMcCorrectIndex;
        if (ok) examCorrect++;
        examAnswerShown = true;
        elA.textContent = c.a;
        if (c.sources && c.sources.length) {
          elRefs.innerHTML = renderRefsHtml(c.sources, "Sources");
        } else {
          elRefs.innerHTML = renderRefsHtml(
            collectRefs(c.q, c.a, c.links),
            "References"
          );
        }
        elCard.classList.add("flipped");
        elCard.classList.add("no-flip");
        elFlip.disabled = true;
        elFlip.textContent = "Answer shown";
        elExamGrade.hidden = false;
        const buttons = elExamMcOptions.querySelectorAll(".exam-choice-btn");
        for (let i = 0; i < buttons.length; i++) {
          buttons[i].disabled = true;
          if (i === examMcCorrectIndex) {
            buttons[i].classList.add("exam-choice-correct");
          } else if (i === pickedIndex && !ok) {
            buttons[i].classList.add("exam-choice-wrong");
          }
        }
        elCount.textContent = ok
          ? "Correct."
          : "Incorrect — green shows the correct answer.";
        updateExamHud();
        try {
          elExamNextBtn.focus();
        } catch (err) { }
      }

      function advanceExam() {
        if (!examActive || !examAnswerShown) return;
        examIdx++;
        examAnswerShown = false;
        if (examIdx >= examList.length) {
          finishExamWithResults();
        } else {
          showExamQuestion();
        }
      }

      function finishExamWithResults() {
        if (examTimerId !== null) {
          clearInterval(examTimerId);
          examTimerId = null;
        }
        document.body.classList.remove("exam-active");
        elExamHud.hidden = true;
        elExamGrade.hidden = true;
        const total = examList.length;
        const correct = examCorrect;
        const pct = total ? Math.round((100 * correct) / total) : 0;
        const elapsed = Math.floor((Date.now() - examStartMs) / 1000);
        elExamResultPct.textContent = pct + "%";
        elExamResultDetail.textContent =
          correct + " correct out of " + total + " questions";
        elExamResultTime.textContent = "Time: " + formatElapsed(elapsed);
        elExamResults.hidden = false;
        elCardWrap.hidden = true;
        elExamSetup.hidden = false;
        examActive = false;
        elExamMc.hidden = true;
        elExamMcOptions.innerHTML = "";
        elExamGrade.hidden = true;
        elFlip.disabled = false;
        elFlip.textContent = "Flip";
        elCard.classList.remove("flipped");
        elCard.classList.remove("no-flip");
        elSubLine.innerHTML = subLineStudyHtml;
        examCurrentItem = null;
      }

      function startExam() {
        if (!EXAM_MC_COUNT) {
          window.alert("The practice exam question bank is empty.");
          return;
        }
        let n = parseInt(elExamLength.value, 10);
        n = Math.min(n, EXAM_MC_COUNT);
        if (n < 1) return;
        examList = shuffleArray(EXAM_MC_BANK.slice()).slice(0, n);
        examIdx = 0;
        examCorrect = 0;
        examAnswerShown = false;
        examStartMs = Date.now();
        examActive = true;
        elExamSetup.hidden = true;
        elExamHud.hidden = false;
        elExamResults.hidden = true;
        document.body.classList.add("exam-active");
        elSubLine.innerHTML =
          "Exam mode uses the <strong>FAA-style practice bank</strong> (not flashcards). Choose <strong>A–D</strong> (or <kbd>1</kbd>–<kbd>4</kbd>), review the explanation, then <strong>Next</strong> or <kbd>Enter</kbd>.";
        if (examTimerId !== null) clearInterval(examTimerId);
        examTimerId = setInterval(updateExamHud, 1000);
        showExamQuestion();
      }

      function endExamEarly() {
        if (!examActive) return;
        if (examTimerId !== null) {
          clearInterval(examTimerId);
          examTimerId = null;
        }
        document.body.classList.remove("exam-active");
        elExamHud.hidden = true;
        elExamGrade.hidden = true;
        elExamMc.hidden = true;
        elExamMcOptions.innerHTML = "";
        elExamSetup.hidden = false;
        examActive = false;
        examList = [];
        examIdx = 0;
        elFlip.disabled = false;
        elFlip.textContent = "Flip";
        elCard.classList.remove("flipped");
        elCard.classList.remove("no-flip");
        elSubLine.innerHTML = subLineStudyHtml;
        examCurrentItem = null;
        applyFilter();
      }

      function dismissExamResults() {
        elExamResults.hidden = true;
        elCardWrap.hidden = false;
        elExamMc.hidden = true;
        elExamMcOptions.innerHTML = "";
        examList = [];
        examIdx = 0;
        examCorrect = 0;
        examCurrentItem = null;
        elSubLine.innerHTML = subLineStudyHtml;
        applyFilter();
      }

      function show() {
        if (examActive) return;
        elFlip.textContent = "Flip";
        elFlip.disabled = false;
        elCard.classList.remove("no-flip");
        if (filtered.length === 0) {
          elQ.textContent = "No cards match filter.";
          elA.textContent = "Clear the search box.";
          elRefs.innerHTML = "";
          elProgress.textContent = "0 / 0";
          elCount.textContent = "Total in deck: " + deck.length;
          elCard.classList.remove("flipped");
          return;
        }
        if (index >= filtered.length) index = filtered.length - 1;
        if (index < 0) index = 0;
        const c = filtered[index];
        elQ.textContent = c.q;
        elA.textContent = c.a;
        const links = collectRefs(c.q, c.a, c.links);
        elRefs.innerHTML = renderRefsHtml(links);
        elProgress.textContent = index + 1 + " / " + filtered.length + " (showing)";
        elCount.textContent =
          "Full deck: " + deck.length + " cards · " + CARDS_CLEAN.length + " topics";
        elCard.classList.remove("flipped");
      }

      function applyFilter() {
        if (examActive) return;
        const q = elFilter.value.trim().toLowerCase();
        if (!q) {
          filtered = deck.slice();
        } else {
          filtered = deck.filter(function (c) {
            return (
              c.q.toLowerCase().indexOf(q) !== -1 ||
              c.a.toLowerCase().indexOf(q) !== -1
            );
          });
        }
        index = 0;
        show();
      }

      function flip() {
        if (examActive) return;
        if (filtered.length === 0) return;
        elCard.classList.toggle("flipped");
      }

      function next() {
        if (examActive) return;
        if (filtered.length === 0) return;
        index = (index + 1) % filtered.length;
        elCard.classList.remove("flipped");
        show();
      }

      function prev() {
        if (examActive) return;
        if (filtered.length === 0) return;
        index = (index - 1 + filtered.length) % filtered.length;
        elCard.classList.remove("flipped");
        show();
      }

      function shuffle() {
        if (examActive) return;
        shuffleDeckInPlace(deck);
        applyFilter();
      }

      function randomCard() {
        if (examActive) return;
        if (filtered.length === 0) return;
        index = randomUintBelow(filtered.length);
        elCard.classList.remove("flipped");
        show();
      }

      document.getElementById("flip").addEventListener("click", function (e) {
        e.stopPropagation();
        flip();
      });
      document.getElementById("next").addEventListener("click", function (e) {
        e.stopPropagation();
        next();
      });
      document.getElementById("prev").addEventListener("click", function (e) {
        e.stopPropagation();
        prev();
      });
      document.getElementById("shuffle").addEventListener("click", shuffle);
      document.getElementById("random").addEventListener("click", randomCard);

      elExamStart.addEventListener("click", startExam);
      elExamEnd.addEventListener("click", function () {
        if (window.confirm("End this exam? Your progress will not be saved.")) {
          endExamEarly();
        }
      });
      elExamDismiss.addEventListener("click", dismissExamResults);
      elExamNextBtn.addEventListener("click", function (e) {
        e.stopPropagation();
        advanceExam();
      });

      elRefs.addEventListener("click", function (e) {
        e.stopPropagation();
      });

      elCard.addEventListener("click", function () {
        if (examActive) return;
        flip();
      });
      elCard.addEventListener("keydown", function (e) {
        if (e.key === " " || e.key === "Enter") {
          e.preventDefault();
          if (examActive) return;
          flip();
        }
      });

      elFilter.addEventListener("input", applyFilter);

      document.addEventListener("keydown", function (e) {
        if (e.target === elFilter) return;
        if (examActive) {
          if (examAnswerShown) {
            if (e.key === "Enter") {
              e.preventDefault();
              advanceExam();
            }
            return;
          }
          const k = e.key;
          if (k === "1" || k === "2" || k === "3" || k === "4") {
            e.preventDefault();
            onExamMcSelect(parseInt(k, 10) - 1);
          }
          return;
        }
        if (e.key === " " || e.key === "Spacebar") {
          e.preventDefault();
          flip();
        } else if (e.key === "ArrowRight") next();
        else if (e.key === "ArrowLeft") prev();
        else if (e.key === "s" || e.key === "S") shuffle();
        else if (e.key === "r" || e.key === "R") randomCard();
      });

      shuffleDeckInPlace(deck);
      filtered = deck.slice();
      index = filtered.length ? randomUintBelow(filtered.length) : 0;
      show();
    })();
  </script>
</body>

</html>
