        { q: "What is a microburst and why is it dangerous for aircraft?", a: "Severe downdraft — extremely hazardous to low-altitude aircraft." },
        { q: "What does it mean when the dew point is close to the temperature?", a: "High relative humidity — fog and low visibility likely." },
        { q: "What is adiabatic cooling and how does it cause cloud formation?", a: "Rising air expands and cools — basis for cloud formation." },
        { q: "What is the atmospheric temperature lapse rate?", a: "Temperature decrease with altitude — affects stability." },
        { q: "In aviation weather reports, how is wind direction expressed?", a: "Direction FROM which wind blows (e.g., 270° = wind from the west)." },
        { q: "What is the standard atmospheric pressure at sea level?", a: "29.92 inHg / 1013.25 hPa." },
        { q: "What is density altitude and why does it matter for sUAS performance?", a: "Higher density altitude = thinner air → reduced performance, less lift, shorter battery life." },
        { q: "How is density altitude calculated?", a: "Pressure altitude corrected for non-standard temperature. Higher temp = higher density altitude." },
        { q: "How does cold weather affect sUAS battery performance?", a: "Reduced capacity and voltage sag — warm batteries before flight." },
        { q: "How does hot weather affect sUAS performance?", a: "Higher density altitude → reduced motor/prop performance." },
        { q: "How does fog affect Part 107 flight legality?", a: "If you cannot maintain 3 SM visibility, you cannot legally fly under Part 107." },
        { q: "What is wind shear near the ground and how does it affect sUAS?", a: "Sudden wind changes near surface and obstacles — affects small aircraft significantly." },
        { q: "What types of turbulence occur near mountains?", a: "Mountain wave, rotor turbulence — can be severe." },
        { q: "How long do rod cells (night vision) take to adapt, and what should pilots avoid?", a: "30 minutes to adapt to dark; avoid bright lights before night operations." },
        { q: "What scanning technique works best for detecting objects at night?", a: "Off-center viewing — peripheral vision (rod cells) detects dim objects better than direct gaze." },
        { q: "What icing risks affect sUAS in cold, moist conditions?", a: "Props and sensors can accumulate ice in cold, moist conditions — reduced lift and control." }
      ];

      function collectRefs(q, a, extra) {
        const blob = (q + " " + a).toLowerCase();
        const seen = {};
        const out = [];
        function add(link) {
          if (!link || !link.url) return;
          if (seen[link.url]) return;
          seen[link.url] = true;
          out.push(link);
        }
        if (extra && Array.isArray(extra)) {
          extra.forEach(add);
        }
        for (let i = 0; i < REF_RULES.length; i++) {
          const rule = REF_RULES[i];
          if (rule.re.test(blob)) {
            for (let j = 0; j < rule.links.length; j++) add(rule.links[j]);
          }
        }
        if (out.length === 0) {
          DEFAULT_REFS.forEach(add);
        } else {
          let k = 0;
          while (out.length < 2 && k < DEFAULT_REFS.length) {
            add(DEFAULT_REFS[k++]);
          }
        }
        return out.slice(0, 8);
      }

      function escapeHtml(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function renderRefsHtml(links, title) {
        if (!links.length) return "";
        const t = title ? escapeHtml(title) : "References";
        let html = "<p class=\"refs-title\">" + t + "</p><ul>";
        for (let i = 0; i < links.length; i++) {
          const L = links[i];
          const lab = escapeHtml(L.label);
          const u = escapeHtml(L.url);
          html += "<li><a href=\"" + u + "\" target=\"_blank\" rel=\"noopener noreferrer\">" + lab + "</a></li>";
        }
        html += "</ul>";
        return html;
      }

       * Images: https://jrupprechtlaw.com/part-107-knowledge-test/
       */
      const EXAM_FIGURE_RULES = [
        { re: /Blencoe.*Onawa|railroad tracks from Blencoe/i, key: "blencoe", caption: "Figure 78 — Blencoe to Onawa (chart excerpt)" },
        { re: /Contracted to inspect towers ~4 NM southwest|towers ~4 NM southwest of.*SUX|~4 NM southwest of Sioux Gateway/i, key: "siouxGateway", caption: "Figure 78 — SUX tower inspection (altitude over towers)" },
        { re: /What class of airspace is associated with Sioux Gateway/i, key: "siouxGateway", caption: "Figure 78 — Sioux Gateway (SUX) Class D" },
        { re: /Dallas Executive \(RBD\)|Figure 25.*Area 3/i, key: "redbird", caption: "Figure 25 — Dallas Executive (RBD)" },
        { re: /floor of the Savannah Class C|Figure 23.*area 3\)/i, key: "savannah", caption: "Figure 23 — Savannah Class C shelf" },
        { re: /What type of airport is Pueblo Airport/i, key: "nationalSecurityPueblo", caption: "Pueblo Airport — Class D (chart context; Pueblo article figure)" },
        { re: /Fentress NALF|NFE.*Figure 20.*Area 1/i, key: "fentress", caption: "Figure 20 — Area 1 (Fentress / NFE)" },
        { re: /Figure 59.*area 2|VR1667|chart shows VR routes/i, key: "figure59", caption: "Figure 59 — Military training routes (VR)" },
        { re: /R-2305|Figure 75.*Area 6/i, key: "gilaBend", caption: "Figure 75 — Area 6 (R-2305 / chart supplement)" },
        { re: /Devil.*Lake West MOA|Figure 21.*MOA.*east of area 2/i, key: "devilsLakeMoa", caption: "Figure 21 — Devil’s Lake West MOA" },
        { re: /dashed magenta.*Pueblo|Pueblo.*dashed magenta|Pueblo.*national security/i, key: "nationalSecurityPueblo", caption: "Pueblo area — national security / chart symbols" },
        { re: /Plantation Airport \(JYL\)|Figure 23.*Area 4/i, key: "plantation", caption: "Figure 23 — Area 4 (Plantation / JYL)" },
        { re: /Lake Drummond|Figure 20, area 2/i, key: "figure20Area2", caption: "Figure 20 — Area 2 (Lake Drummond)" },
        { re: /Figure 20, area 5|CHECK NOTAMS.*unmarked balloon/i, key: "figure20Area3", caption: "Figure 20 — Area 5 (NOTAM / balloon caution)" },
        { re: /Figure 12.*METAR|KMDW.*Figure 12|KJFK.*Figure 12/i, pdf: true, caption: "Figure 12 (METAR) — use the full-color figure in the FAA PDF (no separate image on the article)." },
        { re: /Figure 2\)|33 pound.*30°|30° banked turn/i, key: "loadFactor", caption: "Figure 2 — Load factor / bank (also see supplement)" },
        { re: /Cooperstown|midfield left downwind to RWY 13|Figure 26, area 2/i, key: "figure26Downwind", caption: "Figure 26 — Area 2 (traffic pattern)" },
        { re: /Jamestown Regional \(JMS\)|46\.9N.*98\.6W/i, key: "figure26Lat", caption: "Figure 26 — Area 4 (Jamestown / tower)" },
        { re: /line of latitude at area 4/i, key: "figure26Lat", caption: "Figure 26 — Area 4 (latitude line)" },
        { re: /Minot International \(MOT\)|Figure 21, Area 1.*MOT/i, key: "minot", caption: "Figure 21 — Area 1 (Minot)" },
        { re: /What airport is at approximately 47°40|47°40.*101°26/i, key: "garrison", caption: "Figure 21 — Garrison (coordinates)" },
        { re: /Coeur D['\u2019]Alene|Figure 22, area 2/i, key: "trenton", caption: "Figure 22 — Coeur d’Alene (CTAF)" },
        { re: /northeast of Hertford|2 NM northeast of Hertford/i, key: "hertford", caption: "Figure 20 — Area 4 (Hertford obstacle)" },
        { re: /What type of airport is Card Airport/i, key: "cardAirport", caption: "Figure 24 — Area 6 (Card Airport)" },
        { re: /Elizabeth City Regional \(ECG\)|Figure 20, area 3\).*ECG|southeast of Elizabeth City Regional/i, key: "elizabethCity", caption: "Figure 20 — Area 3 (ECG / balloon)" },
        { re: /parachute operations at Tri-County|Figure 24, Area 3.*Legend 1/i, key: "parachute", caption: "Figure 24 — Tri-County / parachute note" }
      ];

      function buildExamFigureHtml(q) {
        const pdf = EXAM_SRC.faaKnowledgeSupplement;
        const article = EXAM_SRC.rupprechtLaw;
        function img(key, caption) {
          const url = EXAM_FIGURE_IMAGES[key];
          if (!url) return "";
          const u = escapeHtml(url);
          const c = escapeHtml(caption);
          return (
            '<div class="exam-figure-block"><img src="' +
            u +
            '" alt="' +
            c +
            '" loading="lazy" decoding="async" /><p class="exam-figure-caption">' +
            c +
            ' · <a href="' +
            escapeHtml(article) +
            '" target="_blank" rel="noopener noreferrer">Rupprecht Law article</a> · <a href="' +
            escapeHtml(pdf) +
            '" target="_blank" rel="noopener noreferrer">FAA FAA-CT-8080-2H (PDF)</a></p></div>'
          );
        }
        function pdfNote(caption) {
          return (
            '<div class="exam-figure-block"><p class="exam-figure-caption">' +
            escapeHtml(caption) +
            ' <a href="' +
            escapeHtml(pdf) +
            '" target="_blank" rel="noopener noreferrer">FAA testing supplement (PDF)</a> · <a href="' +
            escapeHtml(article) +
            '" target="_blank" rel="noopener noreferrer">Article</a></p></div>'
          );
        }
        var ri;
        for (ri = 0; ri < EXAM_FIGURE_RULES.length; ri++) {
          var rule = EXAM_FIGURE_RULES[ri];
          if (!rule.re.test(q)) continue;
          if (rule.pdf) return pdfNote(rule.caption);
          return img(rule.key, rule.caption);
        }
        if (/Refer to FAA-CT-8080-2H/i.test(q)) {
          return pdfNote(
            "This question refers to a figure in FAA-CT-8080-2H — open the FAA PDF and locate the figure cited in the stem."
          );
        }
        return "";
      }

      let deck = CARDS_CLEAN.slice();
      let index = 0;
      let filtered = deck;

      let examActive = false;
      let examList = [];
      let examIdx = 0;
      let examCorrect = 0;
      let examAnswerShown = false;
      let examMcCorrectIndex = 0;
      let examCurrentItem = null;
      let examStartMs = 0;
      let examTimerId = null;
      var isExamPage = false;

      const elCard = document.getElementById("card");
      const elQ = document.getElementById("q");
      const elA = document.getElementById("a");
      const elRefs = document.getElementById("refs");
      const elProgress = document.getElementById("progress");
      const elCount = document.getElementById("count");
      const elFilter = document.getElementById("filter");
      const elFlip = document.getElementById("flip");
      const elSubLine = document.getElementById("subLine");
      const elExamSetup = document.getElementById("examSetup");
      const elExamLength = document.getElementById("examLength");
      const elExamStart = document.getElementById("examStart");
      const elExamHud = document.getElementById("examHud");
      const elExamHudText = document.getElementById("examHudText");
      const elExamGrade = document.getElementById("examGrade");
      const elExamResults = document.getElementById("examResults");
      const elExamResultPct = document.getElementById("examResultPct");
      const elExamResultDetail = document.getElementById("examResultDetail");
      const elExamResultTime = document.getElementById("examResultTime");
      const elExamEnd = document.getElementById("examEnd");
      const elExamDismiss = document.getElementById("examDismiss");
      const elExamNextBtn = document.getElementById("examNextBtn");
      const elExamMc = document.getElementById("examMc");
      const elExamMcOptions = document.getElementById("examMcOptions");
      const elCardWrap = document.getElementById("cardWrap");
      const elExamFigures = document.getElementById("examFigures");

      function clearExamFigures() {
        elExamFigures.innerHTML = "";
        elExamFigures.hidden = true;
      }

      let subLineStudyHtml = elSubLine.innerHTML;

      /** Uniform index in [0, maxExclusive), preferring crypto RNG when available. */
      function randomUintBelow(maxExclusive) {
        if (maxExclusive <= 0) return 0;
        if (typeof crypto !== "undefined" && crypto.getRandomValues) {
          const buf = new Uint32Array(1);
          crypto.getRandomValues(buf);
          return buf[0] % maxExclusive;
        }
        return Math.floor(Math.random() * maxExclusive);
      }

      function shuffleArray(arr) {
        const a = arr.slice();
        for (let i = a.length - 1; i > 0; i--) {
          const j = randomUintBelow(i + 1);
          const t = a[i];
          a[i] = a[j];
          a[j] = t;
        }
        return a;
      }

      function shuffleDeckInPlace(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
          const j = randomUintBelow(i + 1);
          const t = arr[i];
          arr[i] = arr[j];
          arr[j] = t;
        }
        return arr;
      }

      /**
       * Shuffle answer positions so letter memorization does not match the bank file.
       */
      function prepareExamBankItem(item) {
        const pairs = item.choices.map(function (text, i) {
          return { text: text, isCorrect: i === item.correctIndex };
        });
        const shuffled = shuffleArray(pairs);
        let correctIndex = -1;
        for (let j = 0; j < 4; j++) {
          if (shuffled[j].isCorrect) correctIndex = j;
        }
        return {
          q: item.q,
          a: item.a,
          links: item.links,
          sources: item.sources,
          choices: shuffled.map(function (p) {
            return p.text;
          }),
          correctIndex: correctIndex
        };
      }

      function renderExamMcOptions(choices, onPick) {
        const letters = ["A", "B", "C", "D"];
        elExamMcOptions.innerHTML = "";
        for (let i = 0; i < 4; i++) {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "exam-choice-btn";
          btn.textContent = letters[i] + ". " + choices[i];
          btn.dataset.index = String(i);
          btn.addEventListener("click", function () {
            onPick(parseInt(btn.dataset.index, 10));
          });
          elExamMcOptions.appendChild(btn);
        }
      }

      function formatElapsed(totalSec) {
        const mm = Math.floor(totalSec / 60);
        const ss = totalSec % 60;
        return mm + ":" + (ss < 10 ? "0" : "") + ss;
      }

      function updateExamHud() {
        if (!examActive || !examList.length) return;
        const elapsed = Math.floor((Date.now() - examStartMs) / 1000);
        elExamHudText.textContent =
          "Q " +
          (examIdx + 1) +
          " / " +
          examList.length +
          " · " +
          examCorrect +
          " correct · " +
          formatElapsed(elapsed) +
          " elapsed";
      }

      function showExamQuestion() {
        elExamResults.hidden = true;
        elCardWrap.hidden = false;
        if (examIdx >= examList.length) {
          finishExamWithResults();
          return;
        }
        elExamMc.hidden = false;
        const c = examList[examIdx];
        elQ.textContent = c.q;
        var figHtml = buildExamFigureHtml(c.q);
        if (figHtml) {
          elExamFigures.innerHTML = figHtml;
          elExamFigures.hidden = false;
        } else {
          clearExamFigures();
        }
        elA.textContent = "";
        elRefs.innerHTML = "";
        elCard.classList.remove("flipped");
        elCard.classList.remove("no-flip");
        examAnswerShown = false;
        elExamGrade.hidden = true;
        elFlip.disabled = true;
        elFlip.textContent = "Multiple choice";
        examCurrentItem = prepareExamBankItem(c);
        examMcCorrectIndex = examCurrentItem.correctIndex;
        renderExamMcOptions(examCurrentItem.choices, onExamMcSelect);
        elProgress.textContent = "Exam · question " + (examIdx + 1) + " of " + examList.length;
        elCount.textContent =
          "FAA-style practice bank · Pick A–D or keys 1–4.";
        updateExamHud();
      }

      function onExamMcSelect(pickedIndex) {
        if (!examActive || examAnswerShown || examIdx >= examList.length) return;
        const c = examCurrentItem;
        if (!c) return;
        const ok = pickedIndex === examMcCorrectIndex;
        if (ok) examCorrect++;
        examAnswerShown = true;
        elA.textContent = c.a;
        if (c.sources && c.sources.length) {
          elRefs.innerHTML = renderRefsHtml(c.sources, "Sources");
        } else {
          elRefs.innerHTML = renderRefsHtml(
            collectRefs(c.q, c.a, c.links),
            "References"
          );
        }
        elCard.classList.add("flipped");
        elCard.classList.remove("no-flip");
        elFlip.disabled = false;
        updateExamFlipButtonLabel();
        elExamGrade.hidden = false;
        const buttons = elExamMcOptions.querySelectorAll(".exam-choice-btn");
        for (let i = 0; i < buttons.length; i++) {
          buttons[i].disabled = true;
          if (i === examMcCorrectIndex) {
            buttons[i].classList.add("exam-choice-correct");
          } else if (i === pickedIndex && !ok) {
            buttons[i].classList.add("exam-choice-wrong");
          }
        }
        elCount.textContent = ok
          ? "Correct."
          : "Incorrect — green shows the correct answer.";
        updateExamHud();
        try {
          elExamNextBtn.focus();
        } catch (err) { }
      }

      function advanceExam() {
        if (!examActive || !examAnswerShown) return;
        examIdx++;
        examAnswerShown = false;
        if (examIdx >= examList.length) {
          finishExamWithResults();
        } else {
          showExamQuestion();
        }
      }

      function finishExamWithResults() {
        if (examTimerId !== null) {
          clearInterval(examTimerId);
          examTimerId = null;
        }
        document.body.classList.remove("exam-active");
        elExamHud.hidden = true;
        elExamGrade.hidden = true;
        const total = examList.length;
        const correct = examCorrect;
        const pct = total ? Math.round((100 * correct) / total) : 0;
        const elapsed = Math.floor((Date.now() - examStartMs) / 1000);
        elExamResultPct.textContent = pct + "%";
        elExamResultDetail.textContent =
          correct + " correct out of " + total + " questions";
        elExamResultTime.textContent = "Time: " + formatElapsed(elapsed);
        elExamResults.hidden = false;
        elCardWrap.hidden = true;
        elExamSetup.hidden = false;
        examActive = false;
        elExamMc.hidden = true;
        elExamMcOptions.innerHTML = "";
        elExamGrade.hidden = true;
        clearExamFigures();
        elFlip.disabled = false;
        elFlip.textContent = "Flip";
        elCard.classList.remove("flipped");
        elCard.classList.remove("no-flip");
        elSubLine.innerHTML = subLineStudyHtml;
        examCurrentItem = null;
        if (isExamPage) {
          elExamDismiss.textContent = "Start another";
          document.getElementById("mainToolbar").hidden = true;
        }
      }

      function startExam() {
        if (!EXAM_MC_COUNT) {
          window.alert("The practice exam question bank is empty.");
          return;
        }
        let n = parseInt(elExamLength.value, 10);
        n = Math.min(n, EXAM_MC_COUNT);
        if (n < 1) return;
        examList = shuffleArray(EXAM_MC_BANK.slice()).slice(0, n);
        examIdx = 0;
        examCorrect = 0;
        examAnswerShown = false;
        examStartMs = Date.now();
        examActive = true;
        elExamSetup.hidden = true;
        elExamHud.hidden = false;
        elExamResults.hidden = true;
        document.body.classList.add("exam-active");
        elSubLine.innerHTML =
          "Exam mode uses the <strong>FAA-style practice bank</strong> (not flashcards). Choose <strong>A–D</strong> (or <kbd>1</kbd>–<kbd>4</kbd>), review the explanation, then <strong>Next</strong> or <kbd>Enter</kbd>. Use <strong>Flip</strong> or <kbd>Space</kbd> to switch between question and answer.";
        if (isExamPage) {
          document.getElementById("mainToolbar").hidden = false;
        }
        if (examTimerId !== null) clearInterval(examTimerId);
        examTimerId = setInterval(updateExamHud, 1000);
        showExamQuestion();
      }

      function endExamEarly() {
        if (!examActive) return;
        if (examTimerId !== null) {
          clearInterval(examTimerId);
          examTimerId = null;
        }
        document.body.classList.remove("exam-active");
        elExamHud.hidden = true;
        elExamGrade.hidden = true;
        elExamMc.hidden = true;
        elExamMcOptions.innerHTML = "";
        clearExamFigures();
        elExamSetup.hidden = false;
        examActive = false;
        examList = [];
        examIdx = 0;
        elFlip.disabled = false;
        elFlip.textContent = "Flip";
        elCard.classList.remove("flipped");
        elCard.classList.remove("no-flip");
        elSubLine.innerHTML = subLineStudyHtml;
        examCurrentItem = null;
        if (isExamPage) {
          elCardWrap.hidden = true;
          document.getElementById("mainToolbar").hidden = true;
        } else {
          applyFilter();
        }
      }

      function dismissExamResults() {
        elExamResults.hidden = true;
        elExamMc.hidden = true;
        elExamMcOptions.innerHTML = "";
        clearExamFigures();
        examList = [];
        examIdx = 0;
        examCorrect = 0;
        examCurrentItem = null;
        elSubLine.innerHTML = subLineStudyHtml;
        if (isExamPage) {
          elCardWrap.hidden = true;
          elExamSetup.hidden = false;
          document.getElementById("mainToolbar").hidden = true;
        } else {
          elCardWrap.hidden = false;
          applyFilter();
        }
      }

      function show() {
        if (examActive) return;
        elFlip.textContent = "Flip";
        elFlip.disabled = false;
        elCard.classList.remove("no-flip");
        if (filtered.length === 0) {
          elQ.textContent = "No cards match filter.";
          elA.textContent = "Clear the search box.";
          elRefs.innerHTML = "";
          elProgress.textContent = "0 / 0";
          elCount.textContent = "Total in deck: " + deck.length;
          elCard.classList.remove("flipped");
          return;
        }
        if (index >= filtered.length) index = filtered.length - 1;
        if (index < 0) index = 0;
        const c = filtered[index];
        elQ.textContent = c.q;
        elA.textContent = c.a;
        const links = collectRefs(c.q, c.a, c.links);
        elRefs.innerHTML = renderRefsHtml(links);
        elProgress.textContent = index + 1 + " / " + filtered.length + " (showing)";
        elCount.textContent =
          "Full deck: " + deck.length + " cards · " + CARDS_CLEAN.length + " topics";
        elCard.classList.remove("flipped");
      }

      function applyFilter() {
        if (examActive) return;
        const q = elFilter.value.trim().toLowerCase();
        if (!q) {
          filtered = deck.slice();
        } else {
          filtered = deck.filter(function (c) {
            return (
              c.q.toLowerCase().indexOf(q) !== -1 ||
              c.a.toLowerCase().indexOf(q) !== -1
            );
          });
        }
        index = 0;
        show();
      }

      function updateExamFlipButtonLabel() {
        if (!examActive || !examAnswerShown) return;
        elFlip.textContent = elCard.classList.contains("flipped")
          ? "Show question"
          : "Show answer";
      }

      function flip() {
        if (examActive) {
          if (!examAnswerShown) return;
          elCard.classList.toggle("flipped");
          updateExamFlipButtonLabel();
          return;
        }
        if (filtered.length === 0) return;
        elCard.classList.toggle("flipped");
      }

      function next() {
        if (examActive) return;
        if (filtered.length === 0) return;
        index = (index + 1) % filtered.length;
        elCard.classList.remove("flipped");
        show();
      }

      function prev() {
        if (examActive) return;
        if (filtered.length === 0) return;
        index = (index - 1 + filtered.length) % filtered.length;
        elCard.classList.remove("flipped");
        show();
      }

      function shuffle() {
        if (examActive) return;
        shuffleDeckInPlace(deck);
        applyFilter();
      }

      function randomCard() {
        if (examActive) return;
        if (filtered.length === 0) return;
        index = randomUintBelow(filtered.length);
        elCard.classList.remove("flipped");
        show();
      }

      document.getElementById("flip").addEventListener("click", function (e) {
        e.stopPropagation();
        flip();
      });
      document.getElementById("next").addEventListener("click", function (e) {
        e.stopPropagation();
        next();
      });
      document.getElementById("prev").addEventListener("click", function (e) {
        e.stopPropagation();
        prev();
      });
      document.getElementById("shuffle").addEventListener("click", shuffle);
      document.getElementById("random").addEventListener("click", randomCard);

      elExamStart.addEventListener("click", startExam);
      elExamEnd.addEventListener("click", function () {
        if (window.confirm("End this exam? Your progress will not be saved.")) {
          endExamEarly();
        }
      });
      elExamDismiss.addEventListener("click", dismissExamResults);
      elExamNextBtn.addEventListener("click", function (e) {
        e.stopPropagation();
        advanceExam();
      });

      elRefs.addEventListener("click", function (e) {
        e.stopPropagation();
      });

      elCard.addEventListener("click", function () {
        if (examActive && !examAnswerShown) return;
        flip();
      });
      elCard.addEventListener("keydown", function (e) {
        if (e.key === " " || e.key === "Spacebar") {
          e.preventDefault();
          if (examActive && !examAnswerShown) return;
          flip();
          return;
        }
        if (e.key === "Enter") {
          if (examActive && examAnswerShown) {
            return;
          }
          e.preventDefault();
          if (examActive) return;
          flip();
        }
      });

      elFilter.addEventListener("input", applyFilter);

      document.addEventListener("keydown", function (e) {
        if (e.target === elFilter) return;
        if (examActive) {
          if (examAnswerShown) {
            if (e.key === "Enter") {
              e.preventDefault();
              advanceExam();
              return;
            }
            if (e.key === " " || e.key === "Spacebar") {
              e.preventDefault();
              flip();
              return;
            }
            return;
          }
          const k = e.key;
          if (k === "1" || k === "2" || k === "3" || k === "4") {
            e.preventDefault();
            onExamMcSelect(parseInt(k, 10) - 1);
          }
          return;
        }
        if (e.key === " " || e.key === "Spacebar") {
          e.preventDefault();
          flip();
        } else if (e.key === "ArrowRight") next();
        else if (e.key === "ArrowLeft") prev();
        else if (e.key === "s" || e.key === "S") shuffle();
        else if (e.key === "r" || e.key === "R") randomCard();
      });

      var urlParams = new URLSearchParams(window.location.search);
      var activeCat = urlParams.get("cat");
      var elHomeView = document.getElementById("homeView");
      var elStudyView = document.getElementById("studyView");
      var elCategoryTitle = document.getElementById("categoryTitle");
      var elBackLink = document.getElementById("backLink");

      if (!activeCat) {
        elHomeView.hidden = false;
        elStudyView.hidden = true;
        var grid = document.getElementById("categoryGrid");
        CATEGORIES.forEach(function (cat) {
          var count = CARDS_CLEAN.filter(function (c) { return classifyCard(c) === cat.id; }).length;
          var a = document.createElement("a");
          a.href = "?cat=" + cat.id;
          a.className = "category-card";
          a.innerHTML =
            '<span class="category-icon">' + cat.icon + '</span>' +
            '<span class="category-label">' + escapeHtml(cat.label) + '</span>' +
            '<span class="category-desc">' + escapeHtml(cat.desc) + '</span>' +
            '<span class="category-count">' + count + ' cards</span>';
          grid.appendChild(a);
        });
        var examLink = document.createElement("a");
        examLink.href = "?cat=exam";
        examLink.className = "category-card";
        examLink.innerHTML =
          '<span class="category-icon">📝</span>' +
          '<span class="category-label">Practice Exam</span>' +
          '<span class="category-desc">FAA-style multiple choice practice test</span>' +
          '<span class="category-count">' + EXAM_MC_COUNT + ' questions</span>';
        grid.appendChild(examLink);
        var allLink = document.createElement("a");
        allLink.href = "?cat=all";
        allLink.className = "category-card";
        allLink.innerHTML =
          '<span class="category-icon">📚</span>' +
          '<span class="category-label">All Cards</span>' +
          '<span class="category-desc">Study the complete deck</span>' +
          '<span class="category-count">' + CARDS_CLEAN.length + ' cards</span>';
        grid.appendChild(allLink);
        return;
      }

      elHomeView.hidden = true;
      elStudyView.hidden = false;

      if (activeCat === "exam") {
        isExamPage = true;
        elCategoryTitle.textContent = "📝 Practice Exam";
        document.title = "Practice Exam — Part 107 Flashcards";
        elSubLine.innerHTML =
          "FAA-style practice exam · Choose <strong>A–D</strong> (or <kbd>1</kbd>–<kbd>4</kbd>) · " +
          "<kbd>Space</kbd> flip · <kbd>Enter</kbd> next question";
        subLineStudyHtml = elSubLine.innerHTML;
        document.querySelector(".search").hidden = true;
        document.getElementById("mainToolbar").hidden = true;
        elProgress.hidden = true;
        elCount.hidden = true;
        elCardWrap.hidden = true;
        return;
      }

      elExamSetup.hidden = true;

      if (activeCat !== "all") {
        var catInfo = CATEGORIES.find(function (c) { return c.id === activeCat; });
        if (catInfo) {
          elCategoryTitle.textContent = catInfo.icon + " " + catInfo.label;
          document.title = catInfo.label + " — Part 107 Flashcards";
        }
        deck = CARDS_CLEAN.filter(function (c) { return classifyCard(c) === activeCat; });
        if (deck.length === 0) deck = CARDS_CLEAN.slice();
      } else {
        elCategoryTitle.textContent = "📚 All Cards";
      }

      shuffleDeckInPlace(deck);
      filtered = deck.slice();
      index = filtered.length ? randomUintBelow(filtered.length) : 0;
      show();
    })();
  </script>
</body>

</html>
